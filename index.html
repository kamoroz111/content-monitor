<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Контент-монитор — Кирилл Морозов</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--ink:#0d0d0d;--bg:#fafaf7;--card:#fff;--border:#e0dcd5;--muted:#777;--accent:#1847c8;--r:8px;
  --mkt:#3b6d11;--mkt-bg:#eaf3de;--ai:#0c447c;--ai-bg:#e6f1fb;
  --both:#633806;--both-bg:#faeeda;--news:#534ab7;--news-bg:#eeedfe}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
header{background:var(--ink);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{color:#fff;font-size:15px;font-weight:600}.logo span{color:#7aa4f5}
.hstats{display:flex;gap:16px}.hstat{color:rgba(255,255,255,.45);font-size:12px}.hstat b{color:#fff}
.sdot{width:8px;height:8px;border-radius:50%;background:#5dcaa5;display:inline-block;margin-right:5px}
.sdot.err{background:#e24b4a}.sdot.loading{background:#ef9f27;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.tabs{display:flex;gap:2px;padding:12px 20px 0;border-bottom:1px solid var(--border);background:var(--card);overflow-x:auto}
.tab{padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}.tab:hover{color:var(--ink)}
.main{padding:16px 20px;max-width:1200px}
.add-form{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:14px}
.form-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}.form-row:last-child{margin-bottom:0}
.form-row input,.form-row select{font-family:inherit;font-size:13px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--ink);outline:none}
.form-row input:focus,.form-row select:focus{border-color:var(--accent)}
.f-url{flex:2;min-width:200px}.f-title{flex:3;min-width:180px}.f-idea{flex:4;min-width:200px}
.f-cat{width:155px}.f-prio{width:125px}.f-fmt{width:145px}
.btn-add{background:var(--ink);color:#fff;border:none;border-radius:6px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn-add:hover{background:var(--accent)}.btn-add:disabled{opacity:.5;cursor:wait}
.btn-ai{background:#534ab7;color:#fff;border:none;border-radius:6px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn-ai:hover{background:#3c3489}.btn-ai:disabled{opacity:.5;cursor:wait}
.filters{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.fil{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:none;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap}
.fil.on{background:var(--ink);color:#fff;border-color:var(--ink)}.fil:hover{color:var(--ink)}
.sbox{padding:6px 10px;border:1px solid var(--border);border-radius:20px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--ink);outline:none;min-width:220px}
.sbox:focus{border-color:var(--accent)}
.items{display:flex;flex-direction:column;gap:6px}
.item{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:flex;gap:12px;align-items:flex-start}
.item:hover{border-color:#c0bdb5}.ibody{flex:1;min-width:0}
.itop{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.cb{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
.cb-marketing{background:var(--mkt-bg);color:var(--mkt)}.cb-ai{background:var(--ai-bg);color:var(--ai)}
.cb-both{background:var(--both-bg);color:var(--both)}.cb-news{background:var(--news-bg);color:var(--news)}
.cb-case{background:#f0ede7;color:#555}
.fb{font-size:10px;padding:2px 8px;border-radius:20px;background:#f0ede7;color:#666;font-weight:500}
.ititle{font-size:13px;font-weight:500}
.iurl a{font-size:12px;color:var(--accent);text-decoration:none;word-break:break-all}
.iurl a:hover{text-decoration:underline}
.iidea{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.5}
.idate{font-size:11px;color:#aaa}
.iact{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.ssel{font-size:11px;padding:3px 6px;border:1px solid var(--border);border-radius:5px;font-family:inherit;background:var(--bg);cursor:pointer}
.bdel{font-size:11px;color:#ccc;background:none;border:none;cursor:pointer;padding:2px 4px;border-radius:4px}
.bdel:hover{color:#e24b4a;background:#feecec}
.pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:14px}
.ph{background:#e24b4a}.pm{background:#ef9f27}.pl{background:#5dcaa5}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.sh{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.si{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sn{font-size:13px;font-weight:600}.su a{font-size:11px;color:var(--accent);text-decoration:none}
.su a:hover{text-decoration:underline}.sd{font-size:12px;color:var(--muted);line-height:1.5}
.sf{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.bsd{font-size:11px;color:#ccc;background:none;border:none;cursor:pointer}
.bsd:hover{color:#e24b4a}
.stgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:20px}
.stc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px}
.stn{font-size:26px;font-weight:700;line-height:1;margin-bottom:3px}.stl{font-size:11px;color:var(--muted)}
.cr{display:flex;flex-direction:column;gap:6px}
.ci{display:flex;align-items:center;gap:8px}.cl{font-size:12px;min-width:130px}
.cbw{flex:1;height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden}
.cbb{height:100%;background:var(--accent);border-radius:3px}.cc{font-size:12px;color:var(--muted);min-width:24px;text-align:right}
.sec{display:none}.sec.on{display:block}
.empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:13px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:#fff;padding:10px 18px;border-radius:var(--r);font-size:13px;z-index:999;transform:translateY(80px);opacity:0;transition:all .25s}
.toast.show{transform:translateY(0);opacity:1}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<header>
  <div class="logo">К.<span>М</span> · Контент-монитор</div>
  <div class="hstats">
    <div class="hstat"><span class="sdot loading" id="sdot"></span><span id="slbl">подключение...</span></div>
    <div class="hstat">Ссылок: <b id="ht">—</b></div>
    <div class="hstat">В работе: <b id="hw">—</b></div>
    <div class="hstat">Готово: <b id="hd">—</b></div>
  </div>
</header>
<div class="tabs">
  <button class="tab on" onclick="tab('links',0)">🔗 Банк ссылок</button>
  <button class="tab" onclick="tab('sources',1)">📡 Источники</button>
  <button class="tab" onclick="tab('stats',2)">📊 Статистика</button>
</div>
<div class="main">
  <div id="tab-links" class="sec on">
    <div class="add-form">
      <div class="form-row">
        <input class="f-url" id="l-url" type="url" placeholder="https://... ссылка">
        <input class="f-title" id="l-title" placeholder="Название / о чём">
        <select class="f-cat" id="l-cat">
          <option value="ai">🔵 AI / Нейросети</option>
          <option value="marketing">🟢 Маркетинг</option>
          <option value="both">🟡 Маркетинг + AI</option>
          <option value="news">🟣 Новость</option>
          <option value="case">⚪ Кейс / Разбор</option>
        </select>
        <select class="f-prio" id="l-prio">
          <option value="high">🔴 Высокий</option>
          <option value="med" selected>🟡 Средний</option>
          <option value="low">🟢 Низкий</option>
        </select>
      </div>
      <div class="form-row">
        <input class="f-idea" id="l-idea" placeholder="Моя идея — как адаптировать для контента">
        <select class="f-fmt" id="l-fmt">
          <option value="">Формат...</option>
          <option value="article">Статья VC.ru</option>
          <option value="dzen">Статья Дзен</option>
          <option value="tg">TG-пост</option>
          <option value="yt">YouTube</option>
          <option value="short">Шортс / Рилс</option>
          <option value="carousel">Карусель</option>
          <option value="vk">VK-пост</option>
          <option value="digest">Дайджест</option>
        </select>
        <button class="btn-add" id="btn-add" onclick="addLink()">+ Добавить</button>
        <button class="btn-ai" id="btn-ai" onclick="aiIdea()">🤖 AI-идея</button>
      </div>
    </div>
    <div class="filters">
      <button class="fil on" onclick="flt('all',this)">Все</button>
      <button class="fil" onclick="flt('ai',this)">🔵 AI</button>
      <button class="fil" onclick="flt('marketing',this)">🟢 Маркетинг</button>
      <button class="fil" onclick="flt('both',this)">🟡 Оба</button>
      <button class="fil" onclick="flt('news',this)">🟣 Новость</button>
      <button class="fil" onclick="flt('case',this)">⚪ Кейс</button>
      <button class="fil" onclick="flt('st:new',this)">🆕 Новые</button>
      <button class="fil" onclick="flt('st:wip',this)">⚙️ В работе</button>
      <button class="fil" onclick="flt('prio:high',this)">🔴 Срочные</button>
      <input class="sbox" id="search" placeholder="🔍 Поиск..." oninput="renderLinks()">
    </div>
    <div id="items" class="items"><div class="empty">Загрузка...</div></div>
  </div>

  <div id="tab-sources" class="sec">
    <div class="add-form">
      <div class="form-row">
        <input style="flex:2;min-width:160px" id="s-name" placeholder="Название источника">
        <input style="flex:3;min-width:200px" id="s-url" type="url" placeholder="https://...">
        <select class="f-cat" id="s-cat">
          <option value="ai">🔵 AI / Нейросети</option>
          <option value="marketing">🟢 Маркетинг</option>
          <option value="both">🟡 Оба</option>
          <option value="news">🟣 Новости</option>
        </select>
        <select style="width:135px" id="s-type">
          <option value="tg">Telegram</option>
          <option value="site">Сайт / Блог</option>
          <option value="yt">YouTube</option>
          <option value="email">Email-рассылка</option>
          <option value="twitter">Twitter/X</option>
          <option value="author">Автор VC/Дзен</option>
        </select>
        <input style="flex:3;min-width:180px" id="s-desc" placeholder="Почему полезен">
        <button class="btn-add" id="btn-src" onclick="addSource()">+ Добавить</button>
      </div>
    </div>
    <div class="filters" id="sfil">
      <button class="fil on" onclick="sflt('all',this)">Все</button>
      <button class="fil" onclick="sflt('ai',this)">🔵 AI</button>
      <button class="fil" onclick="sflt('marketing',this)">🟢 Маркетинг</button>
      <button class="fil" onclick="sflt('both',this)">🟡 Оба</button>
      <button class="fil" onclick="sflt('tg',this)">TG</button>
      <button class="fil" onclick="sflt('yt',this)">YouTube</button>
      <button class="fil" onclick="sflt('site',this)">Сайт</button>
      <button class="fil" onclick="sflt('author',this)">Авторы</button>
    </div>
    <div id="sgrid" class="sgrid"><div class="empty">Загрузка...</div></div>
  </div>

  <div id="tab-stats" class="sec">
    <div id="stats"><div class="empty">Загрузка...</div></div>
  </div>
</div>

<script>
const SURL = "https://lrjcxtprwpgrdemwyptv.supabase.co";
const SKEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxyamN4dHByd3BncmRlbXd5cHR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMzE3MTUsImV4cCI6MjA5MTkwNzcxNX0.gA67TpNrfrLxF48oSReVZt5oUSkc2-Jbl1K8CinKxsQ";
const db = supabase.createClient(SURL, SKEY);

const CATS = {ai:"AI / Нейросети", marketing:"Маркетинг", both:"Маркетинг + AI", news:"Новость", case:"Кейс / Разбор"};
const FMTS = {article:"Статья VC.ru", dzen:"Статья Дзен", tg:"TG-пост", yt:"YouTube", short:"Шортс", carousel:"Карусель", vk:"VK", digest:"Дайджест"};
const ICONS = {tg:"📱", site:"🌐", yt:"🎬", email:"📧", twitter:"🐦", author:"✍️"};

const DEF = [
  {id:"d1",name:"TheRundown AI",url:"https://therundown.ai",cat:"ai",type:"email",description:"Лучший AI-дайджест. 5 новостей ежедневно."},
  {id:"d2",name:"Нейросети для людей",url:"https://t.me/aipeople",cat:"ai",type:"tg",description:"RU-AI новости, применение."},
  {id:"d3",name:"Дымшаков про AI",url:"https://t.me/dymshakovai",cat:"ai",type:"tg",description:"AI в бизнесе, практика."},
  {id:"d4",name:"PPC.World",url:"https://t.me/ppcworld",cat:"marketing",type:"tg",description:"Новости VK Ads, Директ, TG Ads."},
  {id:"d5",name:"Matt Wolfe",url:"https://youtube.com/@mreflow",cat:"ai",type:"yt",description:"Лучший EN-канал по AI-инструментам."},
  {id:"d6",name:"Гребенюк",url:"https://t.me/grebenuk",cat:"marketing",type:"tg",description:"Маркетинг, продажи, бизнес."},
  {id:"d7",name:"VC.ru Маркетинг",url:"https://vc.ru/marketing",cat:"marketing",type:"site",description:"Что обсуждают профессионалы."},
  {id:"d8",name:"@karpathy",url:"https://x.com/karpathy",cat:"ai",type:"twitter",description:"Лучшие объяснения как работает AI."}
];

let links = [], sources = [], lf = "all", sf = "all";

async function init() {
  sync("loading", "подключение...");
  try {
    await Promise.all([loadLinks(), loadSources()]);
    sync("ok", "Supabase ✓");
    if (!sources.length) {
      const {error} = await db.from("sources").insert(DEF);
      if (!error) { sources = DEF; renderSrc(); }
    }
  } catch(e) {
    sync("err", "ошибка соединения");
    toast("Ошибка подключения. Запусти SQL в Supabase.", "err");
  }
}

async function loadLinks() {
  const {data, error} = await db.from("links").select("*").order("created_at", {ascending: false});
  if (error) throw error;
  links = data || [];
  renderLinks();
  updH();
}

async function loadSources() {
  const {data, error} = await db.from("sources").select("*").order("created_at");
  if (error) throw error;
  sources = data || [];
  renderSrc();
}

async function addLink() {
  const url = gv("l-url"), title = gv("l-title");
  if (!url && !title) { toast("Добавь ссылку или название"); return; }
  const btn = id("btn-add"); btn.disabled = true; btn.textContent = "...";
  const row = {id: uid(), url, title, cat: gs("l-cat"), prio: gs("l-prio"), idea: gv("l-idea"), fmt: gs("l-fmt"), status: "new"};
  const {error} = await db.from("links").insert([row]);
  btn.disabled = false; btn.textContent = "+ Добавить";
  if (error) { toast("Ошибка: " + error.message, "err"); return; }
  ["l-url","l-title","l-idea"].forEach(x => id(x).value = "");
  id("l-fmt").value = "";
  await loadLinks();
  toast("Сохранено ✓");
}

async function setSt(lid, val) {
  await db.from("links").update({status: val}).eq("id", lid);
  const l = links.find(x => x.id === lid);
  if (l) l.status = val;
  updH();
}

async function delLink(lid) {
  if (!confirm("Удалить запись?")) return;
  await db.from("links").delete().eq("id", lid);
  links = links.filter(x => x.id !== lid);
  renderLinks(); updH();
  toast("Удалено");
}

async function addSource() {
  const name = gv("s-name");
  if (!name) { toast("Введи название"); return; }
  const btn = id("btn-src"); btn.disabled = true; btn.textContent = "...";
  const row = {id: uid(), name, url: gv("s-url"), cat: gs("s-cat"), type: gs("s-type"), description: gv("s-desc")};
  const {error} = await db.from("sources").insert([row]);
  btn.disabled = false; btn.textContent = "+ Добавить";
  if (error) { toast("Ошибка: " + error.message, "err"); return; }
  ["s-name","s-url","s-desc"].forEach(x => id(x).value = "");
  await loadSources();
  toast("Источник добавлен ✓");
}

async function delSrc(sid) {
  if (!confirm("Удалить источник?")) return;
  await db.from("sources").delete().eq("id", sid);
  sources = sources.filter(x => x.id !== sid);
  renderSrc();
  toast("Удалено");
}

async function aiIdea() {
  const url = gv("l-url"), title = gv("l-title");
  if (!url && !title) { toast("Введи ссылку или название"); return; }
  const btn = id("btn-ai"); btn.disabled = true; btn.textContent = "🤖 Думаю...";
  try {
    const {data: r1, error: e1} = await db.functions.invoke("rapid-worker", {body: {url, title, type: "analyze"}});
    if (e1) throw e1;
    const {data: r2, error: e2} = await db.functions.invoke("rapid-worker", {body: {url, title, type: "ideas"}});
    if (e2) throw e2;
    id("l-cat").value = r1.category || "case";
    id("l-idea").value = r2.ideas || "";
    toast("✅ Категория и идея заполнены");
  } catch(e) {
    toast("AI ошибка: " + e.message, "err");
  } finally {
    btn.disabled = false; btn.textContent = "🤖 AI-идея";
  }
}

function renderLinks() {
  const q = (id("search") ? id("search").value : "").toLowerCase();
  const items = links.filter(l => {
    const m = !q || [l.title, l.url, l.idea].filter(Boolean).some(s => s.toLowerCase().includes(q));
    if (!m) return false;
    if (lf === "all") return true;
    if (lf.startsWith("st:")) return l.status === lf.slice(3);
    if (lf.startsWith("prio:")) return l.prio === lf.slice(5);
    return l.cat === lf;
  });
  const el = id("items");
  if (!items.length) { el.innerHTML = '<div class="empty">Пока ничего. Добавь первую ссылку ☝️</div>'; return; }
  el.innerHTML = items.map(function(l) {
    var pd = l.prio === "high" ? "ph" : l.prio === "med" ? "pm" : "pl";
    var dt = l.created_at ? new Date(l.created_at).toLocaleDateString("ru-RU", {day:"2-digit", month:"2-digit"}) : "";
    var cat = CATS[l.cat] || l.cat;
    var fmt = FMTS[l.fmt] || "";
    var html = '<div class="item">';
    html += '<div class="pdot ' + pd + '"></div>';
    html += '<div class="ibody">';
    html += '<div class="itop">';
    html += '<span class="cb cb-' + l.cat + '">' + esc(cat) + '</span>';
    if (fmt) html += '<span class="fb">' + esc(fmt) + '</span>';
    html += '<span class="idate">' + dt + '</span>';
    html += '</div>';
    if (l.title) html += '<div class="ititle">' + esc(l.title) + '</div>';
    if (l.url) {
      var disp = l.url.length > 72 ? l.url.slice(0,72) + "…" : l.url;
      html += '<div class="iurl"><a href="' + esc(l.url) + '" target="_blank">' + esc(disp) + '</a></div>';
    }
    if (l.idea) html += '<div class="iidea">💡 ' + esc(l.idea) + '</div>';
    html += '</div>';
    html += '<div class="iact">';
    html += '<select class="ssel" onchange="setSt('' + l.id + '',this.value)">';
    html += '<option value="new"' + (l.status==="new"?" selected":"") + '>🆕 Новое</option>';
    html += '<option value="wip"' + (l.status==="wip"?" selected":"") + '>⚙️ В работе</option>';
    html += '<option value="done"' + (l.status==="done"?" selected":"") + '>✅ Готово</option>';
    html += '<option value="skip"' + (l.status==="skip"?" selected":"") + '>⏸ Отложено</option>';
    html += '</select>';
    html += '<button class="bdel" onclick="delLink('' + l.id + '')">✕ удалить</button>';
    html += '</div></div>';
    return html;
  }).join("");
}

function renderSrc() {
  var srcs = sources.filter(function(s) {
    return sf === "all" ? true : s.cat === sf || s.type === sf;
  });
  var el = id("sgrid");
  if (!srcs.length) { el.innerHTML = '<div class="empty">Нет источников.</div>'; return; }
  el.innerHTML = srcs.map(function(s) {
    var ico = ICONS[s.type] || "🔗";
    var cmap = {ai:"AI", marketing:"Маркетинг", both:"Оба", news:"Новости"};
    var catLbl = cmap[s.cat] || s.cat;
    var dom = "";
    if (s.url) { try { dom = new URL(s.url).hostname.replace("www.",""); } catch(e) { dom = s.url; } }
    var html = '<div class="sc">';
    html += '<div class="sh"><div class="si">' + ico + '</div><div>';
    html += '<div class="sn">' + esc(s.name) + '</div>';
    if (dom) html += '<div class="su"><a href="' + esc(s.url) + '" target="_blank">' + esc(dom) + '</a></div>';
    html += '</div></div>';
    html += '<div class="sd">' + esc(s.description||"") + '</div>';
    html += '<div class="sf">';
    html += '<span class="cb cb-' + s.cat + '" style="font-size:10px">' + catLbl + '</span>';
    html += '<button class="bsd" onclick="delSrc('' + s.id + '')">✕</button>';
    html += '</div></div>';
    return html;
  }).join("");
}

function renderStats() {
  var bc = {}, bs = {new:0,wip:0,done:0,skip:0}, bf = {};
  links.forEach(function(l) {
    bc[l.cat] = (bc[l.cat]||0)+1;
    bs[l.status] = (bs[l.status]||0)+1;
    if (l.fmt) bf[l.fmt] = (bf[l.fmt]||0)+1;
  });
  var tot = links.length || 1;
  var tf = Object.entries(bf).sort(function(a,b){return b[1]-a[1];}).slice(0,5);

  var html = '<div class="stgrid">';
  html += '<div class="stc"><div class="stn">' + links.length + '</div><div class="stl">Всего ссылок</div></div>';
  html += '<div class="stc"><div class="stn" style="color:var(--accent)">' + bs.new + '</div><div class="stl">Новых</div></div>';
  html += '<div class="stc"><div class="stn" style="color:#ef9f27">' + bs.wip + '</div><div class="stl">В работе</div></div>';
  html += '<div class="stc"><div class="stn" style="color:var(--mkt)">' + bs.done + '</div><div class="stl">Готово</div></div>';
  html += '<div class="stc"><div class="stn">' + sources.length + '</div><div class="stl">Источников</div></div>';
  html += '</div>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">';
  html += '<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px">';
  html += '<div style="font-size:13px;font-weight:600;margin-bottom:12px">По тематике</div>';
  html += '<div class="cr">';
  Object.entries(CATS).forEach(function(kv) {
    var k = kv[0], lbl = kv[1];
    if (!bc[k]) return;
    html += '<div class="ci"><div class="cl"><span class="cb cb-' + k + '" style="font-size:10px">' + lbl + '</span></div>';
    html += '<div class="cbw"><div class="cbb" style="width:' + Math.round((bc[k]||0)/tot*100) + '%"></div></div>';
    html += '<div class="cc">' + (bc[k]||0) + '</div></div>';
  });
  html += '</div></div>';
  html += '<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px">';
  html += '<div style="font-size:13px;font-weight:600;margin-bottom:12px">Топ форматов</div>';
  html += '<div class="cr">';
  if (tf.length) {
    tf.forEach(function(kv) {
      var k = kv[0], v = kv[1];
      html += '<div class="ci"><div class="cl"><span class="fb">' + (FMTS[k]||k) + '</span></div>';
      html += '<div class="cbw"><div class="cbb" style="width:' + Math.round(v/tot*100) + '%;background:#ef9f27"></div></div>';
      html += '<div class="cc">' + v + '</div></div>';
    });
  } else {
    html += '<div style="font-size:12px;color:var(--muted)">Добавь ссылки с форматом</div>';
  }
  html += '</div></div></div>';
  id("stats").innerHTML = html;
}

function tab(name, idx) {
  document.querySelectorAll(".tab").forEach(function(t,i){ t.classList.toggle("on", i===idx); });
  ["links","sources","stats"].forEach(function(n) {
    id("tab-"+n).classList.toggle("on", n===name);
  });
  if (name === "stats") renderStats();
}

function flt(f, btn) {
  lf = f;
  document.querySelectorAll("#tab-links .fil").forEach(function(b){ b.classList.remove("on"); });
  btn.classList.add("on");
  renderLinks();
}

function sflt(f, btn) {
  sf = f;
  document.querySelectorAll("#sfil .fil").forEach(function(b){ b.classList.remove("on"); });
  btn.classList.add("on");
  renderSrc();
}

function updH() {
  id("ht").textContent = links.length;
  id("hw").textContent = links.filter(function(l){ return l.status==="wip"; }).length;
  id("hd").textContent = links.filter(function(l){ return l.status==="done"; }).length;
}

function sync(s, lbl) {
  var d = id("sdot");
  d.className = "sdot" + (s==="ok" ? "" : " "+s);
  id("slbl").textContent = lbl;
}

function toast(msg, type) {
  var t = id("toast");
  t.textContent = msg;
  t.style.background = type==="err" ? "#a32d2d" : "#0d0d0d";
  t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 2500);
}

function id(x) { return document.getElementById(x); }
function gv(x) { var el = id(x); return el ? el.value.trim() : ""; }
function gs(x) { var el = id(x); return el ? el.value : ""; }
function esc(s) { return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

document.addEventListener("keydown", function(ev) {
  if (ev.key !== "Enter") return;
  var tab = document.querySelector(".sec.on");
  if (!tab) return;
  if (tab.id === "tab-links" && document.activeElement.closest(".add-form")) addLink();
  if (tab.id === "tab-sources" && document.activeElement.closest(".add-form")) addSource();
});

init();
</script>
</body>
</html>
