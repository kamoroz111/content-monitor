<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мониторинг контента — Кирилл Морозов</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --ink:#0d0d0d;
      --bg:#fafaf7;
      --card:#fff;
      --border:#e0dcd5;
      --muted:#777;
      --accent:#1847c8;
      --r:8px;
      --mkt:#3b6d11;
      --mkt-bg:#eaf3de;
      --ai:#0c447c;
      --ai-bg:#e6f1fb;
      --both:#633806;
      --both-bg:#faeeda;
      --news:#534ab7;
      --news-bg:#eeedfe;
    }

    *{box-sizing:border-box;margin:0;padding:0}

    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--bg);
      color:var(--ink);
      font-size:14px;
    }

    .hidden{display:none !important}

    body.auth-locked .tabs,
    body.auth-locked .main{
      filter:blur(2px);
      pointer-events:none;
      user-select:none;
    }

    header{
      background:var(--ink);
      padding:12px 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      position:sticky;
      top:0;
      z-index:100;
      flex-wrap:wrap;
    }

    .logo{
      color:#fff;
      font-size:15px;
      font-weight:600;
      white-space:nowrap;
    }

    .logo span{color:#7aa4f5}

    .header-right{
      display:flex;
      align-items:center;
      gap:18px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .hstats{
      display:flex;
      gap:16px;
      flex-wrap:wrap;
    }

    .hstat{
      color:rgba(255,255,255,.45);
      font-size:12px;
      white-space:nowrap;
    }

    .hstat b{color:#fff}

    .auth-actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .user-email{
      color:rgba(255,255,255,.8);
      font-size:12px;
    }

    .btn-logout{
      background:rgba(255,255,255,.08);
      color:#fff;
      border:1px solid rgba(255,255,255,.14);
      border-radius:6px;
      padding:7px 10px;
      font-size:12px;
      cursor:pointer;
      transition:background .15s,border-color .15s;
    }

    .btn-logout:hover{
      background:rgba(255,255,255,.14);
      border-color:rgba(255,255,255,.22);
    }

    .sdot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:#5dcaa5;
      display:inline-block;
      margin-right:5px;
    }

    .sdot.err{background:#e24b4a}
    .sdot.loading{background:#ef9f27;animation:pulse 1s infinite}

    @keyframes pulse{
      0%,100%{opacity:1}
      50%{opacity:.4}
    }

    .tabs{
      display:flex;
      gap:2px;
      padding:12px 20px 0;
      border-bottom:1px solid var(--border);
      background:var(--card);
      overflow-x:auto;
    }

    .tab{
      padding:8px 16px;
      font-size:13px;
      font-weight:500;
      cursor:pointer;
      border:none;
      background:none;
      color:var(--muted);
      border-bottom:2px solid transparent;
      white-space:nowrap;
      transition:color .15s;
    }

    .tab.active{
      color:var(--accent);
      border-bottom-color:var(--accent);
    }

    .tab:hover{color:var(--ink)}

    .main{
      padding:16px 20px;
      max-width:1200px;
      margin:0 auto;
    }

    .error-banner{
      background:#fff2f2;
      color:#8f1f1f;
      border:1px solid #f0c9c9;
      border-radius:var(--r);
      padding:12px 14px;
      margin-bottom:14px;
      line-height:1.5;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .add-form{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--r);
      padding:14px;
      margin-bottom:14px;
    }

    .form-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:8px;
    }

    .form-row:last-child{margin-bottom:0}

    .form-row input,
    .form-row select{
      font-family:inherit;
      font-size:13px;
      padding:8px 10px;
      border:1px solid var(--border);
      border-radius:6px;
      background:var(--bg);
      color:var(--ink);
      outline:none;
      transition:border-color .15s;
    }

    .form-row input:focus,
    .form-row select:focus{
      border-color:var(--accent);
    }

    .f-url{flex:2;min-width:220px}
    .f-title{flex:3;min-width:180px}
    .f-idea{flex:4;min-width:220px}
    .f-cat{width:155px}
    .f-prio{width:125px}
    .f-fmt{width:145px}
    .f-src{width:180px}

    .btn-add{
      background:var(--ink);
      color:#fff;
      border:none;
      border-radius:6px;
      padding:8px 18px;
      font-size:13px;
      font-weight:600;
      cursor:pointer;
      white-space:nowrap;
      transition:background .15s;
    }

    .btn-add:hover{background:var(--accent)}
    .btn-add:disabled{opacity:.5;cursor:wait}

    .btn-ai{
      background:#633806;
      color:#fff;
      border:none;
      border-radius:6px;
      padding:8px 18px;
      font-size:13px;
      font-weight:600;
      cursor:pointer;
      white-space:nowrap;
      transition:background .15s;
      margin-left:8px;
    }

    .btn-ai:hover{background:#7a4a0a}
    .btn-ai:disabled{opacity:.5;cursor:wait}

    .filters{
      display:flex;
      gap:6px;
      margin-bottom:12px;
      flex-wrap:wrap;
      align-items:center;
    }

    .fil-btn{
      padding:5px 12px;
      border-radius:20px;
      border:1px solid var(--border);
      background:none;
      font-size:12px;
      font-weight:500;
      color:var(--muted);
      cursor:pointer;
      transition:all .15s;
      white-space:nowrap;
    }

    .fil-btn.active{
      background:var(--ink);
      color:#fff;
      border-color:var(--ink);
    }

    .fil-btn:hover{color:var(--ink)}

    .search-box{
      padding:6px 10px;
      border:1px solid var(--border);
      border-radius:20px;
      font-size:13px;
      font-family:inherit;
      background:var(--bg);
      color:var(--ink);
      outline:none;
      min-width:220px;
    }

    .search-box:focus{border-color:var(--accent)}

    .items{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .item{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--r);
      padding:12px 14px;
      display:flex;
      gap:12px;
      align-items:flex-start;
      transition:border-color .15s;
    }

    .item:hover{border-color:#c0bdb5}

    .item-body{flex:1;min-width:0}

    .item-top{
      display:flex;
      align-items:center;
      gap:8px;
      margin-bottom:5px;
      flex-wrap:wrap;
    }

    .cat-badge{
      font-size:10px;
      font-weight:700;
      padding:2px 8px;
      border-radius:20px;
      white-space:nowrap;
    }

    .cat-marketing{background:var(--mkt-bg);color:var(--mkt)}
    .cat-ai{background:var(--ai-bg);color:var(--ai)}
    .cat-both{background:var(--both-bg);color:var(--both)}
    .cat-news{background:var(--news-bg);color:var(--news)}
    .cat-case{background:#f0ede7;color:#555}

    .fmt-badge{
      font-size:10px;
      padding:2px 8px;
      border-radius:20px;
      background:#f0ede7;
      color:#666;
      font-weight:500;
    }

    .src-inline{
      font-size:11px;
      color:var(--muted);
    }

    .item-title{
      font-size:13px;
      font-weight:500;
      line-height:1.45;
    }

    .item-url a{
      font-size:12px;
      color:var(--accent);
      text-decoration:none;
      word-break:break-all;
    }

    .item-url a:hover{text-decoration:underline}

    .item-idea{
      font-size:12px;
      color:var(--muted);
      margin-top:4px;
      line-height:1.5;
    }

    .item-date{
      font-size:11px;
      color:#aaa;
    }

    .item-actions{
      display:flex;
      flex-direction:column;
      gap:4px;
      flex-shrink:0;
    }

    .status-sel{
      font-size:11px;
      padding:3px 6px;
      border:1px solid var(--border);
      border-radius:5px;
      font-family:inherit;
      background:var(--bg);
      cursor:pointer;
    }

    .btn-del{
      font-size:11px;
      color:#ccc;
      background:none;
      border:none;
      cursor:pointer;
      padding:2px 4px;
      border-radius:4px;
    }

    .btn-del:hover{
      color:#e24b4a;
      background:#feecec;
    }

    .prio-dot{
      width:8px;
      height:8px;
      border-radius:50%;
      flex-shrink:0;
      margin-top:14px;
    }

    .prio-high{background:#e24b4a}
    .prio-med{background:#ef9f27}
    .prio-low{background:#5dcaa5}

    .src-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(270px,1fr));
      gap:10px;
    }

    .src-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--r);
      padding:14px;
    }

    .src-head{
      display:flex;
      align-items:flex-start;
      gap:10px;
      margin-bottom:8px;
    }

    .src-icon{
      width:36px;
      height:36px;
      border-radius:8px;
      border:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:16px;
      flex-shrink:0;
    }

    .src-name{font-size:13px;font-weight:600}

    .src-url a{
      font-size:11px;
      color:var(--accent);
      text-decoration:none;
    }

    .src-url a:hover{text-decoration:underline}

    .src-desc{
      font-size:12px;
      color:var(--muted);
      line-height:1.5;
    }

    .src-foot{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-top:10px;
    }

    .btn-src-del{
      font-size:11px;
      color:#ccc;
      background:none;
      border:none;
      cursor:pointer;
    }

    .btn-src-del:hover{color:#e24b4a}

    .stats-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(110px,1fr));
      gap:10px;
      margin-bottom:20px;
    }

    .stat-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--r);
      padding:12px 16px;
    }

    .stat-n{
      font-size:26px;
      font-weight:700;
      line-height:1;
      margin-bottom:3px;
    }

    .stat-l{
      font-size:11px;
      color:var(--muted);
    }

    .chart-row{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .chart-item{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .chart-label{
      font-size:12px;
      min-width:130px;
    }

    .chart-bar-wrap{
      flex:1;
      height:6px;
      background:#f0f0f0;
      border-radius:3px;
      overflow:hidden;
    }

    .chart-bar{
      height:100%;
      background:var(--accent);
      border-radius:3px;
      transition:width .4s;
    }

    .chart-count{
      font-size:12px;
      color:var(--muted);
      min-width:24px;
      text-align:right;
    }

    .section{display:none}
    .section.active{display:block}

    .empty{
      text-align:center;
      padding:48px 20px;
      color:var(--muted);
      font-size:13px;
      background:var(--card);
      border:1px dashed var(--border);
      border-radius:var(--r);
    }

    .toast{
      position:fixed;
      bottom:20px;
      right:20px;
      background:var(--ink);
      color:#fff;
      padding:10px 18px;
      border-radius:var(--r);
      font-size:13px;
      z-index:999;
      transform:translateY(80px);
      opacity:0;
      transition:all .25s;
    }

    .toast.show{
      transform:translateY(0);
      opacity:1;
    }

    .login-overlay{
      position:fixed;
      inset:0;
      background:rgba(250,250,247,.92);
      backdrop-filter:blur(4px);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:1000;
      padding:20px;
    }

    .login-card{
      width:min(520px,100%);
      background:var(--card);
      border:1px solid var(--border);
      border-radius:14px;
      padding:22px;
      box-shadow:0 20px 60px rgba(0,0,0,.08);
    }

    .login-title{
      font-size:20px;
      font-weight:700;
      margin-bottom:8px;
    }

    .login-sub{
      font-size:13px;
      color:var(--muted);
      line-height:1.55;
      margin-bottom:16px;
    }

    .login-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:8px;
    }

    .login-row:last-child{margin-bottom:0}

    .login-input{
      flex:1;
      min-width:220px;
      font-family:inherit;
      font-size:14px;
      padding:10px 12px;
      border:1px solid var(--border);
      border-radius:8px;
      background:var(--bg);
      color:var(--ink);
      outline:none;
    }

    .login-input:focus{border-color:var(--accent)}

    @media (max-width: 720px){
      header{
        align-items:flex-start;
      }

      .header-right{
        width:100%;
        justify-content:space-between;
      }

      .item{
        flex-direction:column;
      }

      .item-actions{
        width:100%;
        flex-direction:row;
        justify-content:space-between;
      }
    }
  </style>
</head>
<body class="auth-locked">
  <div class="toast" id="toast"></div>

  <div class="login-overlay" id="login-overlay">
    <div class="login-card">
      <div class="login-title">Вход в контент-монитор</div>
      <div class="login-sub">
        Вход по email и паролю. Разрешён только email:
        <b id="allowed-email-label"></b>
      </div>
      <div class="login-row">
        <input class="login-input" id="login-email" type="email" placeholder="you@example.com" />
      </div>
      <div class="login-row">
        <input class="login-input" id="login-password" type="password" placeholder="Пароль" />
        <button class="btn-add" id="btn-login" onclick="login()">Войти</button>
      </div>
    </div>
  </div>

  <header>
    <div class="logo">К.<span>М</span> · Контент-монитор</div>

    <div class="header-right">
      <div class="hstats">
        <div class="hstat">
          <span class="sdot loading" id="sdot"></span>
          <span id="slabel">проверка сессии...</span>
        </div>
        <div class="hstat">Ссылок: <b id="h-total">—</b></div>
        <div class="hstat">В работе: <b id="h-wip">—</b></div>
        <div class="hstat">Готово: <b id="h-done">—</b></div>
      </div>

      <div class="auth-actions">
        <div class="user-email" id="user-email"></div>
        <button class="btn-logout hidden" id="btn-logout" onclick="logoutNow()">Выйти</button>
      </div>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('links')">🔗 Банк ссылок</button>
    <button class="tab" onclick="switchTab('sources')">📡 Источники</button>
    <button class="tab" onclick="switchTab('stats')">📊 Статистика</button>
  </div>

  <div class="main">
    <div id="error-banner" class="error-banner hidden"></div>

    <div id="tab-links" class="section active">
      <div class="add-form">
        <div class="form-row">
          <input class="f-url" id="l-url" type="url" placeholder="https://... ссылка" />
          <input class="f-title" id="l-title" placeholder="Название / о чём" />
          <select class="f-cat" id="l-cat">
            <option value="ai">🔵 AI / Нейросети</option>
            <option value="marketing">🟢 Маркетинг</option>
            <option value="both">🟡 Маркетинг + AI</option>
            <option value="news">🟣 Новость</option>
            <option value="case">⚪ Кейс / Разбор</option>
          </select>
          <select class="f-prio" id="l-prio">
            <option value="high">🔴 Высокий</option>
            <option value="med" selected>🟡 Средний</option>
            <option value="low">🟢 Низкий</option>
          </select>
        </div>

        <div class="form-row">
          <input class="f-idea" id="l-idea" placeholder="Моя идея — как адаптировать для контента" />
          <select class="f-src" id="l-source">
            <option value="">Источник...</option>
          </select>
          <select class="f-fmt" id="l-fmt">
            <option value="">Формат...</option>
            <option value="article">Статья VC.ru</option>
            <option value="dzen">Статья Дзен</option>
            <option value="tg">TG-пост</option>
            <option value="yt">YouTube</option>
            <option value="short">Шортс / Рилс</option>
            <option value="carousel">Карусель</option>
            <option value="vk">VK-пост</option>
            <option value="digest">Дайджест</option>
          </select>
          <button class="btn-add" id="btn-add-link" onclick="addLink()">+ Добавить</button>
          <button class="btn-ai" id="btn-ai" onclick="analyzeContent()">🤖 AI-анализ</button>
        </div>
      </div>

      <div class="filters">
        <button class="fil-btn active" onclick="setF('all',this)">Все</button>
        <button class="fil-btn" onclick="setF('ai',this)">🔵 AI</button>
        <button class="fil-btn" onclick="setF('marketing',this)">🟢 Маркетинг</button>
        <button class="fil-btn" onclick="setF('both',this)">🟡 Оба</button>
        <button class="fil-btn" onclick="setF('news',this)">🟣 Новость</button>
        <button class="fil-btn" onclick="setF('case',this)">⚪ Кейс</button>
        <button class="fil-btn" onclick="setF('st:new',this)">🆕 Новые</button>
        <button class="fil-btn" onclick="setF('st:wip',this)">⚙️ В работе</button>
        <button class="fil-btn" onclick="setF('st:done',this)">✅ Готово</button>
        <button class="fil-btn" onclick="setF('st:skip',this)">⏸ Отложено</button>
        <button class="fil-btn" onclick="setF('prio:high',this)">🔴 Срочные</button>
        <input class="search-box" id="search" placeholder="🔍 Поиск..." oninput="renderLinks()" />
      </div>

      <div id="items-list" class="items">
        <div class="empty">Войдите, чтобы увидеть данные.</div>
      </div>
    </div>

    <div id="tab-sources" class="section">
      <div class="add-form">
        <div class="form-row">
          <input style="flex:2;min-width:160px" id="s-name" placeholder="Название источника" />
          <input style="flex:3;min-width:200px" id="s-url" type="url" placeholder="https://..." />
          <select class="f-cat" id="s-cat">
            <option value="ai">🔵 AI / Нейросети</option>
            <option value="marketing">🟢 Маркетинг</option>
            <option value="both">🟡 Оба</option>
            <option value="news">🟣 Новости</option>
          </select>
          <select style="width:135px" id="s-type">
            <option value="tg">Telegram</option>
            <option value="site">Сайт / Блог</option>
            <option value="yt">YouTube</option>
            <option value="email">Email-рассылка</option>
            <option value="twitter">Twitter/X</option>
            <option value="author">Автор VC/Дзен</option>
          </select>
          <input style="flex:3;min-width:180px" id="s-desc" placeholder="Почему полезен" />
          <button class="btn-add" id="btn-add-src" onclick="addSource()">+ Добавить</button>
        </div>
      </div>

      <div class="filters" id="src-filters">
        <button class="fil-btn active" onclick="setSF('all',this)">Все</button>
        <button class="fil-btn" onclick="setSF('ai',this)">🔵 AI</button>
        <button class="fil-btn" onclick="setSF('marketing',this)">🟢 Маркетинг</button>
        <button class="fil-btn" onclick="setSF('both',this)">🟡 Оба</button>
        <button class="fil-btn" onclick="setSF('news',this)">🟣 Новости</button>
        <button class="fil-btn" onclick="setSF('tg',this)">TG</button>
        <button class="fil-btn" onclick="setSF('yt',this)">YouTube</button>
        <button class="fil-btn" onclick="setSF('site',this)">Сайт</button>
        <button class="fil-btn" onclick="setSF('author',this)">Авторы</button>
      </div>

      <div id="src-grid" class="src-grid">
        <div class="empty">Войдите, чтобы увидеть данные.</div>
      </div>
    </div>

    <div id="tab-stats" class="section">
      <div id="stats-content">
        <div class="empty">Войдите, чтобы увидеть статистику.</div>
      </div>
    </div>
  </div>

  <script>
    const SB_URL = "https://lrjcxtprwpgrdemwyptv.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxyamN4dHByd3BncmRlbXd5cHR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMzE3MTUsImV4cCI6MjA5MTkwNzcxNX0.gA67TpNrfrLxF48oSReVZt5oUSkc2-Jbl1K8CinKxsQ";
    const ALLOWED_EMAIL = "kamoroz175@gmail.com";

    const supabaseClient = supabase.createClient(SB_URL, SB_KEY, {
      auth: {
        autoRefreshToken: true,
        persistSession: true
      }
    });

    const db = supabaseClient;

    const CAT = {
      ai: "AI / Нейросети",
      marketing: "Маркетинг",
      both: "Маркетинг + AI",
      news: "Новость",
      case: "Кейс / Разбор"
    };

    const FMT = {
      article: "Статья VC.ru",
      dzen: "Статья Дзен",
      tg: "TG-пост",
      yt: "YouTube",
      short: "Шортс",
      carousel: "Карусель",
      vk: "VK",
      digest: "Дайджест"
    };

    const ICONS = {
      tg: "📱",
      site: "🌐",
      yt: "🎬",
      email: "📧",
      twitter: "🐦",
      author: "✍️"
    };

    let currentUser = null;
    let links = [];
    let sources = [];
    let lf = "all";
    let sf = "all";

    function showError(text) {
      const el = document.getElementById("error-banner");
      el.textContent = text;
      el.classList.remove("hidden");
    }

    function clearError() {
      const el = document.getElementById("error-banner");
      el.textContent = "";
      el.classList.add("hidden");
    }

    function setAllowedEmailLabel() {
      document.getElementById("allowed-email-label").textContent = ALLOWED_EMAIL;
    }

    function setUserUi() {
      const emailEl = document.getElementById("user-email");
      const logoutBtn = document.getElementById("btn-logout");

      emailEl.textContent = currentUser?.email || "";
      logoutBtn.classList.toggle("hidden", !currentUser);
    }

    function showLogin() {
      document.body.classList.add("auth-locked");
      document.getElementById("login-overlay").classList.remove("hidden");
      document.getElementById("login-email").value = currentUser?.email || ALLOWED_EMAIL || "";
      document.getElementById("login-password").value = "";
    }

    function hideLogin() {
      document.body.classList.remove("auth-locked");
      document.getElementById("login-overlay").classList.add("hidden");
    }

    function clearApp() {
      links = [];
      sources = [];
      renderSourceOptions();
      renderLinks();
      renderSources();
      renderStats();
      updateH();
    }

    function setLoadError(stage, error) {
      const msg = typeof error === "string"
        ? error
        : (error?.message || JSON.stringify(error));
      console.error("DB ERROR:", stage, error);
      showError("Ошибка на этапе: " + stage + "\n" + msg);
      sync("err", "ошибка загрузки");
      toast("Ошибка: " + msg, "err");
      document.getElementById("items-list").innerHTML = "<div class='empty'>Ошибка загрузки links: " + e(msg) + "</div>";
      document.getElementById("src-grid").innerHTML = "<div class='empty'>Ошибка загрузки sources: " + e(msg) + "</div>";
      document.getElementById("stats-content").innerHTML = "<div class='empty'>Ошибка загрузки статистики: " + e(msg) + "</div>";
    }

    async function boot() {
      setAllowedEmailLabel();
      setUserUi();

      supabaseClient.auth.onAuthStateChange(async (event, session) => {
        console.log("AUTH EVENT:", event);

        if (event === "SIGNED_OUT") {
          currentUser = null;
          setUserUi();
          clearApp();
          showLogin();
          sync("err", "нужен вход");
          return;
        }

        if (session?.user) {
          currentUser = session.user;
          setUserUi();
          hideLogin();
          await initApp();
        }
      });

      sync("loading", "проверка сессии...");
      const { data, error } = await supabaseClient.auth.getSession();

      if (error) {
        console.error("SESSION ERROR:", error);
        showError("Ошибка сессии: " + (error.message || "unknown"));
        sync("err", "ошибка сессии");
        showLogin();
        return;
      }

      if (!data.session?.user) {
        currentUser = null;
        setUserUi();
        showLogin();
        sync("err", "нужен вход");
        return;
      }

      currentUser = data.session.user;
      setUserUi();
      hideLogin();
      await initApp();
    }

    async function login() {
      const email = v("login-email").toLowerCase();
      const password = v("login-password");

      if (!email) {
        toast("Введите email", "err");
        return;
      }

      if (!password) {
        toast("Введите пароль", "err");
        return;
      }

      if (ALLOWED_EMAIL && email !== ALLOWED_EMAIL.toLowerCase()) {
        toast("Этот email не разрешён", "err");
        return;
      }

      const btn = document.getElementById("btn-login");
      btn.disabled = true;
      btn.textContent = "Вход...";

      const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      btn.disabled = false;
      btn.textContent = "Войти";

      if (error) {
        console.error("LOGIN ERROR:", error);
        showError("Ошибка входа: " + (error.message || "unknown"));
        toast("Ошибка входа: " + error.message, "err");
        return;
      }

      clearError();
      toast("Вход выполнен");
    }

    async function logoutNow() {
      try {
        console.log("LOGOUT CLICK");
        await supabaseClient.auth.signOut({ scope: "local" });
        currentUser = null;
        setUserUi();
        clearApp();
        showLogin();
        sync("err", "выход выполнен");
        toast("Вы вышли");
        location.reload();
      } catch (error) {
        console.error("LOGOUT ERROR:", error);
        showError("Ошибка выхода: " + (error?.message || JSON.stringify(error)));
        toast("Ошибка выхода", "err");
      }
    }

    async function initApp() {
      clearError();
      sync("loading", "загрузка данных...");

      try {
        await loadSources();
      } catch (error) {
        setLoadError("loadSources", error);
        return;
      }

      try {
        await loadLinks();
      } catch (error) {
        setLoadError("loadLinks", error);
        return;
      }

      renderStats();
      sync("ok", "Supabase ✓");
    }

    async function loadLinks() {
      const { data, error } = await db
        .from("links")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) throw error;

      links = data || [];
      renderLinks();
      updateH();
      renderStats();
    }

    async function loadSources() {
      const { data, error } = await db
        .from("sources")
        .select("*")
        .order("created_at", { ascending: true });

      if (error) throw error;

      sources = data || [];
      renderSourceOptions();
      renderSources();
      renderStats();
    }

    async function analyzeContent() {
      if (!currentUser) {
        toast("Сначала войдите", "err");
        return;
      }

      const url = v("l-url");
      const title = v("l-title");

      if (!url && !title) {
        toast("Сначала введите URL или название");
        return;
      }

      const btn = document.getElementById("btn-ai");
      btn.disabled = true;
      btn.textContent = "🤖 Анализ...";

      try {
        const { data: sessionData } = await supabaseClient.auth.getSession();
        const accessToken = sessionData.session?.access_token;

        const { data, error } = await supabaseClient.functions.invoke("ai-analyze", {
          headers: accessToken
            ? { Authorization: "Bearer " + accessToken }
            : {},
          body: { url, title }
        });

        if (error) throw error;
        if (!data) throw new Error("Пустой ответ функции");

        if (data.category) {
          document.getElementById("l-cat").value = data.category;
        }

        if (data.ideasText) {
          document.getElementById("l-idea").value = data.ideasText;
        }

        toast("AI-анализ готов ✓");
      } catch (e) {
        console.error("AI ERROR:", e);
        toast("Ошибка AI: " + (e.message || "неизвестная ошибка"), "err");
      } finally {
        btn.disabled = false;
        btn.textContent = "🤖 AI-анализ";
      }
    }

    async function addLink() {
      if (!currentUser) {
        toast("Сначала войдите", "err");
        return;
      }

      let url = v("l-url");
      const title = v("l-title");

      if (!url && !title) {
        toast("Добавьте ссылку или название");
        return;
      }

      url = url ? normalizeUrl(url) : "";

      const btn = document.getElementById("btn-add-link");
      btn.disabled = true;
      btn.textContent = "...";

      const row = {
        id: uid(),
        url: url || null,
        title: title || null,
        cat: g("l-cat"),
        prio: g("l-prio"),
        idea: v("l-idea") || null,
        fmt: g("l-fmt") || null,
        status: "new",
        source_id: g("l-source") || null
      };

      const { error } = await db.from("links").insert([row]);

      btn.disabled = false;
      btn.textContent = "+ Добавить";

      if (error) {
        console.error("ADD LINK ERROR:", error);
        toast("Ошибка: " + error.message, "err");
        return;
      }

      document.getElementById("l-url").value = "";
      document.getElementById("l-title").value = "";
      document.getElementById("l-idea").value = "";
      document.getElementById("l-fmt").value = "";
      document.getElementById("l-source").value = "";

      await loadLinks();
      toast("Сохранено ✓");
    }

    async function setStatus(id, val) {
      const { error } = await db
        .from("links")
        .update({ status: val })
        .eq("id", id);

      if (error) {
        console.error("SET STATUS ERROR:", error);
        toast("Не удалось обновить статус", "err");
        return;
      }

      const link = links.find(x => x.id === id);
      if (link) link.status = val;

      renderLinks();
      updateH();
      renderStats();
    }

    async function delLink(id) {
      if (!confirm("Удалить запись?")) return;

      const { error } = await db
        .from("links")
        .delete()
        .eq("id", id);

      if (error) {
        console.error("DELETE LINK ERROR:", error);
        toast("Не удалось удалить запись", "err");
        return;
      }

      links = links.filter(x => x.id !== id);
      renderLinks();
      updateH();
      renderStats();
      toast("Удалено");
    }

    async function addSource() {
      if (!currentUser) {
        toast("Сначала войдите", "err");
        return;
      }

      const name = v("s-name");
      let url = v("s-url");

      if (!name) {
        toast("Введите название", "err");
        return;
      }

      url = url ? normalizeUrl(url) : "";

      const btn = document.getElementById("btn-add-src");
      btn.disabled = true;
      btn.textContent = "...";

      const row = {
        id: uid(),
        name,
        url: url || null,
        cat: g("s-cat"),
        type: g("s-type"),
        description: v("s-desc") || null
      };

      const { error } = await db.from("sources").insert([row]);

      btn.disabled = false;
      btn.textContent = "+ Добавить";

      if (error) {
        console.error("ADD SOURCE ERROR:", error);
        toast("Ошибка: " + error.message, "err");
        return;
      }

      document.getElementById("s-name").value = "";
      document.getElementById("s-url").value = "";
      document.getElementById("s-desc").value = "";

      await loadSources();
      toast("Источник добавлен ✓");
    }

    async function delSource(id) {
      if (!confirm("Удалить источник?")) return;

      const { error } = await db
        .from("sources")
        .delete()
        .eq("id", id);

      if (error) {
        console.error("DELETE SOURCE ERROR:", error);
        toast("Не удалось удалить источник", "err");
        return;
      }

      sources = sources.filter(x => x.id !== id);
      links = links.map(l => l.source_id === id ? { ...l, source_id: null } : l);

      renderSourceOptions();
      renderSources();
      renderLinks();
      renderStats();
      toast("Удалено");
    }

    function renderSourceOptions() {
      const select = document.getElementById("l-source");
      const current = select.value;

      select.innerHTML =
        "<option value=''>Источник...</option>" +
        sources.map(s => "<option value='" + e(s.id) + "'>" + e(s.name) + "</option>").join("");

      if (current && sources.some(s => s.id === current)) {
        select.value = current;
      }
    }

    function renderLinks() {
      const q = (document.getElementById("search")?.value || "").toLowerCase();
      const items = links.filter(l => {
        const sourceName = (sources.find(s => s.id === l.source_id)?.name || "").toLowerCase();
        const matchesSearch =
          !q ||
          [l.title, l.url, l.idea, sourceName]
            .filter(Boolean)
            .some(s => s.toLowerCase().includes(q));

        if (!matchesSearch) return false;
        if (lf === "all") return true;
        if (lf.startsWith("st:")) return l.status === lf.slice(3);
        if (lf.startsWith("prio:")) return l.prio === lf.slice(5);
        return l.cat === lf;
      });

      const el = document.getElementById("items-list");

      if (!items.length) {
        el.innerHTML = "<div class='empty'>Пока ничего нет. Добавьте первую ссылку ☝️</div>";
        return;
      }

      el.innerHTML = items.map(l => {
        const pd = l.prio === "high" ? "prio-high" : l.prio === "med" ? "prio-med" : "prio-low";
        const dt = l.created_at
          ? new Date(l.created_at).toLocaleDateString("ru-RU", { day: "2-digit", month: "2-digit" })
          : "";
        const sourceName = sources.find(s => s.id === l.source_id)?.name || "";
        const href = l.url ? safeUrl(l.url) : "#";

        return (
          "<div class='item'>" +
            "<div class='prio-dot " + pd + "'></div>" +
            "<div class='item-body'>" +
              "<div class='item-top'>" +
                "<span class='cat-badge cat-" + e(l.cat || "") + "'>" + e(CAT[l.cat] || l.cat || "") + "</span>" +
                (l.fmt ? "<span class='fmt-badge'>" + e(FMT[l.fmt] || l.fmt) + "</span>" : "") +
                (sourceName ? "<span class='src-inline'>Источник: " + e(sourceName) + "</span>" : "") +
                "<span class='item-date'>" + e(dt) + "</span>" +
              "</div>" +
              (l.title ? "<div class='item-title'>" + e(l.title) + "</div>" : "") +
              (l.url
                ? "<div class='item-url'><a href='" + e(href) + "' target='_blank' rel='noopener noreferrer'>" + e(l.url.length > 88 ? l.url.slice(0, 88) + "…" : l.url) + "</a></div>"
                : "") +
              (l.idea ? "<div class='item-idea'>💡 " + e(l.idea) + "</div>" : "") +
            "</div>" +
            "<div class='item-actions'>" +
              "<select class='status-sel' onchange='setStatus(\"" + e(l.id) + "\",this.value)'>" +
                "<option value='new' " + (l.status === "new" ? "selected" : "") + ">🆕 Новое</option>" +
                "<option value='wip' " + (l.status === "wip" ? "selected" : "") + ">⚙️ В работе</option>" +
                "<option value='done' " + (l.status === "done" ? "selected" : "") + ">✅ Готово</option>" +
                "<option value='skip' " + (l.status === "skip" ? "selected" : "") + ">⏸ Отложено</option>" +
              "</select>" +
              "<button class='btn-del' onclick='delLink(\"" + e(l.id) + "\")'>✕ удалить</button>" +
            "</div>" +
          "</div>"
        );
      }).join("");
    }

    function renderSources() {
      const srcs = sources.filter(s => {
        if (sf === "all") return true;
        return s.cat === sf || s.type === sf;
      });

      const el = document.getElementById("src-grid");

      if (!srcs.length) {
        el.innerHTML = "<div class='empty'>Нет источников по этому фильтру.</div>";
        return;
      }

      el.innerHTML = srcs.map(s => {
        const ico = ICONS[s.type] || "🔗";
        const catLbl = { ai: "AI", marketing: "Маркетинг", both: "Оба", news: "Новости" }[s.cat] || s.cat;
        const dom = s.url
          ? (() => {
              try {
                return new URL(s.url).hostname.replace("www.","");
              } catch {
                return s.url;
              }
            })()
          : "";

        return (
          "<div class='src-card'>" +
            "<div class='src-head'>" +
              "<div class='src-icon'>" + ico + "</div>" +
              "<div>" +
                "<div class='src-name'>" + e(s.name) + "</div>" +
                (dom ? "<div class='src-url'><a href='" + e(safeUrl(s.url)) + "' target='_blank' rel='noopener noreferrer'>" + e(dom) + "</a></div>" : "") +
              "</div>" +
            "</div>" +
            "<div class='src-desc'>" + e(s.description || "") + "</div>" +
            "<div class='src-foot'>" +
              "<span class='cat-badge cat-" + e(s.cat || "") + "' style='font-size:10px'>" + e(catLbl) + "</span>" +
              "<button class='btn-src-del' onclick='delSource(\"" + e(s.id) + "\")'>✕</button>" +
            "</div>" +
          "</div>"
        );
      }).join("");
    }

    function renderStats() {
      const el = document.getElementById("stats-content");

      if (!currentUser) {
        el.innerHTML = "<div class='empty'>Войдите, чтобы увидеть статистику.</div>";
        return;
      }

      const bc = {};
      const bs = { new: 0, wip: 0, done: 0, skip: 0 };
      const bf = {};

      links.forEach(l => {
        bc[l.cat] = (bc[l.cat] || 0) + 1;
        bs[l.status] = (bs[l.status] || 0) + 1;
        if (l.fmt) bf[l.fmt] = (bf[l.fmt] || 0) + 1;
      });

      const tot = links.length || 1;
      const tf = Object.entries(bf).sort((a, b) => b[1] - a[1]).slice(0, 5);

      el.innerHTML =
        "<div class='stats-grid'>" +
          "<div class='stat-card'><div class='stat-n'>" + links.length + "</div><div class='stat-l'>Всего ссылок</div></div>" +
          "<div class='stat-card'><div class='stat-n' style='color:var(--accent)'>" + (bs.new || 0) + "</div><div class='stat-l'>Новых</div></div>" +
          "<div class='stat-card'><div class='stat-n' style='color:#ef9f27'>" + (bs.wip || 0) + "</div><div class='stat-l'>В работе</div></div>" +
          "<div class='stat-card'><div class='stat-n' style='color:var(--mkt)'>" + (bs.done || 0) + "</div><div class='stat-l'>Готово</div></div>" +
          "<div class='stat-card'><div class='stat-n'>" + sources.length + "</div><div class='stat-l'>Источников</div></div>" +
        "</div>" +
        "<div style='display:grid;grid-template-columns:1fr 1fr;gap:16px'>" +
          "<div style='background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px'>" +
            "<div style='font-size:13px;font-weight:600;margin-bottom:12px'>По тематике</div>" +
            "<div class='chart-row'>" +
              Object.entries(CAT)
                .filter(([k]) => bc[k])
                .map(([k, lbl]) =>
                  "<div class='chart-item'>" +
                    "<div class='chart-label'><span class='cat-badge cat-" + e(k) + "' style='font-size:10px'>" + e(lbl) + "</span></div>" +
                    "<div class='chart-bar-wrap'><div class='chart-bar' style='width:" + Math.round((bc[k] || 0) / tot * 100) + "%'></div></div>" +
                    "<div class='chart-count'>" + (bc[k] || 0) + "</div>" +
                  "</div>"
                ).join("") +
            "</div>" +
          "</div>" +
          "<div style='background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px'>" +
            "<div style='font-size:13px;font-weight:600;margin-bottom:12px'>Топ форматов</div>" +
            "<div class='chart-row'>" +
              (tf.length
                ? tf.map(([k, val]) =>
                    "<div class='chart-item'>" +
                      "<div class='chart-label'><span class='fmt-badge'>" + e(FMT[k] || k) + "</span></div>" +
                      "<div class='chart-bar-wrap'><div class='chart-bar' style='width:" + Math.round(val / tot * 100) + "%;background:#ef9f27'></div></div>" +
                      "<div class='chart-count'>" + val + "</div>" +
                    "</div>"
                  ).join("")
                : "<div style='font-size:12px;color:var(--muted)'>Добавьте ссылки с форматом</div>") +
            "</div>" +
          "</div>" +
        "</div>";
    }

    function switchTab(n) {
      ["links", "sources", "stats"].forEach((t, i) => {
        document.querySelectorAll(".tab")[i].classList.toggle("active", t === n);
        document.getElementById("tab-" + t).classList.toggle("active", t === n);
      });

      if (n === "stats") renderStats();
    }

    function setF(f, btn) {
      lf = f;
      document.querySelectorAll("#tab-links .fil-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      renderLinks();
    }

    function setSF(f, btn) {
      sf = f;
      document.querySelectorAll("#src-filters .fil-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      renderSources();
    }

    function updateH() {
      document.getElementById("h-total").textContent = links.length;
      document.getElementById("h-wip").textContent = links.filter(l => l.status === "wip").length;
      document.getElementById("h-done").textContent = links.filter(l => l.status === "done").length;
    }

    function sync(s, l) {
      const d = document.getElementById("sdot");
      d.className = "sdot" + (s === "ok" ? "" : " " + s);
      document.getElementById("slabel").textContent = l;
    }

    function toast(msg, type) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.style.background = type === "err" ? "#a32d2d" : "#0d0d0d";
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2500);
    }

    function v(id) {
      return document.getElementById(id)?.value?.trim() || "";
    }

    function g(id) {
      return document.getElementById(id)?.value || "";
    }

    function e(s) {
      return String(s || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    function normalizeUrl(raw) {
      try {
        const u = new URL(raw.trim());
        u.hash = "";
        return u.href.replace(/\/$/, "");
      } catch {
        return raw.trim();
      }
    }

    function safeUrl(raw) {
      try {
        const u = new URL(raw);
        if (u.protocol === "http:" || u.protocol === "https:") return u.href;
        return "#";
      } catch {
        return "#";
      }
    }

    document.addEventListener("keydown", ev => {
      if (ev.key !== "Enter") return;

      const loginVisible = !document.getElementById("login-overlay").classList.contains("hidden");
      if (loginVisible) {
        login();
        return;
      }

      const tab = document.querySelector(".section.active");
      if (!tab) return;

      if (tab.id === "tab-links" && document.activeElement.closest(".add-form")) addLink();
      if (tab.id === "tab-sources" && document.activeElement.closest(".add-form")) addSource();
    });

    window.login = login;
    window.logoutNow = logoutNow;
    window.addLink = addLink;
    window.addSource = addSource;
    window.analyzeContent = analyzeContent;
    window.delLink = delLink;
    window.delSource = delSource;
    window.setStatus = setStatus;
    window.switchTab = switchTab;
    window.setF = setF;
    window.setSF = setSF;

    boot();
  </script>
</body>
</html>
