
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Контент-система — Кирилл Морозов</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#f4f7fb;
      --panel:#ffffff;
      --panel-soft:#f8fbff;
      --border:#e2e8f0;
      --border-strong:#d3dbe7;
      --text:#17212b;
      --muted:#697586;
      --muted-soft:#93a1b2;
      --accent:#1f66d1;
      --accent-soft:#eaf2ff;
      --green:#1f9a6d;
      --red:#d05151;
      --amber:#c98d18;
      --purple:#7d66d9;
      --shadow:0 10px 28px rgba(16,24,40,.06);
      --radius:18px;
      --radius-sm:12px;
      --sidebar:256px;
      --content:1380px;
      --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,"Helvetica Neue",Arial,sans-serif;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font)}
    body.auth-locked .app-shell{filter:blur(4px);pointer-events:none;user-select:none}
    .hidden{display:none!important}
    a{color:var(--accent);text-decoration:none}
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    .toast{position:fixed;right:18px;bottom:18px;z-index:9999;padding:12px 16px;border-radius:14px;background:#162033;color:#fff;transform:translateY(24px);opacity:0;transition:.25s;box-shadow:var(--shadow);max-width:480px;line-height:1.45}
    .toast.show{transform:translateY(0);opacity:1}
    .toast.err{background:#8b2b2b}
    .login-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(244,247,251,.88);backdrop-filter:blur(7px);z-index:5000}
    .login-card{width:min(420px,100%);background:var(--panel);border:1px solid var(--border);border-radius:24px;padding:28px;box-shadow:var(--shadow)}
    .login-title{font-size:32px;font-weight:700;line-height:1.08;margin:0 0 10px}
    .login-sub{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:18px}
    .field{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
    .field label{font-size:13px;color:var(--muted);font-weight:600}
    .input,.select,.textarea{width:100%;border:1px solid var(--border);background:#fff;border-radius:14px;padding:13px 14px;color:var(--text);outline:none;transition:border-color .15s, box-shadow .15s}
    .input:focus,.select:focus,.textarea:focus{border-color:#b6c8ea;box-shadow:0 0 0 4px rgba(31,102,209,.08)}
    .textarea{min-height:120px;resize:vertical;line-height:1.6}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:0;border-radius:14px;padding:12px 16px;font-weight:600;transition:.15s}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-primary:hover{background:#1757b7}
    .btn-soft{background:var(--accent-soft);color:var(--accent)}
    .btn-soft:hover{background:#dfeaff}
    .btn-ghost{background:#fff;border:1px solid var(--border);color:var(--text)}
    .btn-ghost:hover{border-color:#c8d4e7;background:#fafcff}
    .btn-danger{background:#fff0f0;color:#a43838;border:1px solid #f0d3d3}
    .btn-sm{padding:9px 12px;border-radius:12px;font-size:13px}
    .app-shell{display:flex;min-height:100vh}
    .sidebar{width:var(--sidebar);background:#eef3f9;border-right:1px solid var(--border);padding:24px 20px 22px;display:flex;flex-direction:column;gap:18px;position:sticky;top:0;height:100vh}
    .brand{display:flex;align-items:flex-start;gap:12px}
    .brand-mark{width:42px;height:42px;border-radius:14px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:20px}
    .brand-title{font-size:18px;font-weight:700;margin:0}
    .brand-sub{font-size:13px;color:var(--muted);margin-top:4px}
    .side-add{margin-top:6px}
    .nav{display:flex;flex-direction:column;gap:6px}
    .nav-btn{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:14px;border:1px solid transparent;background:transparent;color:#445062;font-weight:500;text-align:left}
    .nav-btn.active{background:#fff;border-color:var(--border);color:var(--accent);box-shadow:0 4px 16px rgba(15,23,42,.04)}
    .nav-btn:hover{background:#f7faff}
    .nav-ico{width:22px;text-align:center;font-size:18px}
    .sidebar-footer{margin-top:auto;padding-top:10px;border-top:1px solid rgba(147,161,178,.18);display:flex;align-items:center;justify-content:space-between;gap:10px}
    .user-mini{display:flex;align-items:center;gap:10px;min-width:0}
    .avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#d9e6ff,#f0f5ff);display:flex;align-items:center;justify-content:center;border:1px solid var(--border);font-size:18px}
    .user-mini div{min-width:0}
    .user-mini strong{display:block;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .user-mini span{font-size:12px;color:var(--muted)}
    .main{flex:1;display:flex;flex-direction:column;min-width:0}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:18px 28px;border-bottom:1px solid rgba(226,232,240,.8);position:sticky;top:0;background:rgba(244,247,251,.94);backdrop-filter:blur(8px);z-index:40}
    .topbar-left{display:flex;align-items:center;gap:14px;min-width:0;flex:1}
    .search-wrap{position:relative;max-width:560px;flex:1}
    .search-wrap input{padding-left:42px;height:44px;background:#f0f5fb}
    .search-wrap .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}
    .topbar-right{display:flex;align-items:center;gap:12px}
    .main-inner{padding:28px;max-width:var(--content)}
    .hero h1{margin:0 0 10px;font-size:58px;line-height:.98;letter-spacing:-.03em}
    .hero p{margin:0;color:var(--muted);font-size:16px;line-height:1.65;max-width:780px}
    .split{display:grid;grid-template-columns:340px minmax(0,1fr);gap:22px;margin-top:24px}
    .panel{background:var(--panel);border:1px solid var(--border);border-radius:24px;box-shadow:var(--shadow)}
    .panel-soft{background:var(--panel-soft)}
    .panel-head{padding:20px 22px 0}
    .panel-body{padding:20px 22px}
    .small-label{font-size:13px;font-weight:600;color:var(--muted)}
    .section-title{font-size:16px;font-weight:700;margin:0 0 16px}
    .quick-form .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .quick-form .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
    .quick-form .textarea{min-height:102px}
    .stat-card{margin-top:18px;padding:20px 22px}
    .stat-card .big{font-size:44px;font-weight:700;line-height:1;margin-top:10px}
    .filters-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:2px 0 18px}
    .chip{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;border:1px solid var(--border);background:#f7fbff;color:#475467;font-size:14px;white-space:nowrap}
    .chip.active{background:#fff;border-color:#c8d4e7;box-shadow:0 6px 18px rgba(15,23,42,.04);color:var(--accent)}
    .chip-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
    .list-tools{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:16px}
    .seg{display:inline-flex;background:#edf2f8;border:1px solid var(--border);border-radius:14px;padding:4px;gap:4px}
    .seg button{border:0;background:transparent;border-radius:10px;padding:8px 10px;color:var(--muted)}
    .seg button.active{background:#fff;color:var(--accent)}
    .material-list{display:flex;flex-direction:column;gap:14px}
    .material-card{padding:22px;border-radius:22px;background:#fff;border:1px solid var(--border);box-shadow:var(--shadow);display:grid;grid-template-columns:minmax(0,1fr) auto;gap:18px}
    .material-card.compact{padding:18px}
    .material-card h3{margin:12px 0 10px;font-size:20px;line-height:1.3}
    .material-card p{margin:0;color:var(--muted);line-height:1.55}
    .meta-line{display:flex;align-items:center;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:13px}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:.01em;background:#eef4fb;color:#55687f}
    .badge.status{font-weight:600}
    .badge.type{background:#eef4fb;color:#4b627c}
    .badge.priority-high{background:#fff0f0;color:#b54545}
    .badge.priority-medium{background:#fff5e7;color:#a56a08}
    .badge.priority-low{background:#edf9f3;color:#12724f}
    .badge.translation{background:#eef3ff;color:#355eb8}
    .badge.output{background:#f1f5ff;color:#55607c}
    .progress{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px}
    .progress-bar{width:120px;height:8px;border-radius:999px;background:#edf2f8;overflow:hidden}
    .progress-bar>span{display:block;height:100%;background:var(--accent);border-radius:999px}
    .card-actions{display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;gap:16px}
    .icon-btn{width:36px;height:36px;border-radius:12px;border:1px solid var(--border);background:#fff;color:var(--muted);display:flex;align-items:center;justify-content:center}
    .icon-btn:hover{color:var(--accent);border-color:#c8d4e7}
    .empty{padding:52px 24px;text-align:center;border:1px dashed var(--border-strong);border-radius:22px;color:var(--muted);background:rgba(255,255,255,.5)}
    .board-wrap{display:grid;grid-template-columns:repeat(7,minmax(280px,1fr));gap:18px;overflow:auto;padding-bottom:10px}
    .board-col{background:#f1f5fa;border:1px solid var(--border);border-radius:24px;padding:16px;min-height:420px}
    .board-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
    .board-head h3{margin:0;font-size:22px;letter-spacing:-.02em}
    .board-count{width:28px;height:28px;border-radius:50%;background:#e4edf9;color:#516177;font-size:13px;display:flex;align-items:center;justify-content:center;font-weight:700}
    .board-list{display:flex;flex-direction:column;gap:12px;min-height:340px}
    .board-drop{padding:14px;border:1px dashed #cad5e4;border-radius:16px;color:var(--muted);text-align:center;background:rgba(255,255,255,.35)}
    .board-card{padding:18px;border-radius:18px;background:#fff;border:1px solid var(--border);box-shadow:0 10px 20px rgba(15,23,42,.04)}
    .board-card h4{margin:10px 0 8px;font-size:20px;line-height:1.28}
    .board-card p{margin:0;color:var(--muted);line-height:1.55;font-size:14px}
    .board-card.dragging{opacity:.55}
    .page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:24px}
    .page-head h1,.page-head h2{margin:0;font-size:50px;line-height:1;letter-spacing:-.03em}
    .page-head p{margin:10px 0 0;color:var(--muted);line-height:1.65;max-width:760px}
    .count-pill{padding:10px 14px;border-radius:999px;background:#e9f1fb;color:#55687f;font-weight:700;font-size:14px;white-space:nowrap}
    .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
    .template-card,.prompt-card,.source-card{padding:22px;border-radius:22px;background:#fff;border:1px solid var(--border);box-shadow:var(--shadow)}
    .template-card h3,.prompt-card h3,.source-card h3{margin:12px 0 10px;font-size:22px;line-height:1.2}
    .template-card p,.prompt-card p,.source-card p{margin:0;color:var(--muted);line-height:1.62}
    .template-sections{margin-top:14px;display:flex;flex-wrap:wrap;gap:8px}
    .template-actions,.prompt-actions,.source-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
    .source-form,.prompt-form{margin-bottom:22px}
    .source-form .grid,.prompt-form .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .source-form .grid-3,.prompt-form .grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .settings-layout{display:grid;grid-template-columns:280px minmax(0,1fr);gap:22px}
    .settings-tabs{display:flex;flex-direction:column;gap:8px}
    .settings-tab{padding:14px 16px;border-radius:14px;border:1px solid transparent;background:transparent;text-align:left;color:#475467}
    .settings-tab.active{background:#fff;border-color:var(--border);color:var(--accent);box-shadow:var(--shadow)}
    .settings-block{padding:22px;border-radius:22px;background:#fff;border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:18px}
    .settings-block h3{margin:0 0 18px;font-size:26px;letter-spacing:-.02em}
    .settings-list{display:flex;flex-wrap:wrap;gap:10px}
    .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-top:1px solid #edf2f7}
    .toggle-row:first-child{border-top:0;padding-top:0}
    .toggle{position:relative;width:52px;height:30px;border-radius:999px;background:#dbe5f3;border:0}
    .toggle span{position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 4px 10px rgba(15,23,42,.12)}
    .toggle.active{background:var(--accent)}
    .toggle.active span{left:25px}
    .detail-shell{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:26px}
    .detail-main{min-width:0}
    .detail-side{position:sticky;top:88px;align-self:start;display:flex;flex-direction:column;gap:16px}
    .detail-top{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:18px}
    .detail-top h1{margin:8px 0 12px;font-size:42px;line-height:1.04;letter-spacing:-.03em}
    .back-link{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:14px}
    .detail-meta{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    .detail-task{padding:16px 18px;border-radius:18px;background:#fff;border:1px solid var(--border);box-shadow:var(--shadow);color:var(--muted);line-height:1.65}
    .detail-source{margin-top:12px}
    .detail-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .detail-section{padding:20px 22px;border-radius:22px;background:#fff;border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:16px;scroll-margin-top:110px}
    .detail-section h3{margin:0 0 8px;font-size:28px;letter-spacing:-.02em}
    .detail-helper{color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:16px}
    .section-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:14px}
    .section-grid .field{margin:0}
    .textarea.big{min-height:160px}
    .checklist{display:flex;flex-direction:column;gap:10px;margin-top:4px}
    .check-item{display:flex;align-items:center;gap:10px;color:#344054;padding:10px 12px;border:1px solid #edf2f7;border-radius:14px;background:#fbfdff}
    .check-item input{accent-color:var(--accent);width:16px;height:16px}
    .check-item.done span{text-decoration:line-through;color:var(--muted)}
    .check-add{display:flex;gap:10px;margin-top:12px}
    .section-tools{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
    .summary-card{padding:18px;border-radius:20px;background:#fff;border:1px solid var(--border);box-shadow:var(--shadow)}
    .summary-card h4{margin:0 0 14px;font-size:16px;letter-spacing:.01em;color:#4b5565}
    .summary-nav{display:flex;flex-direction:column;gap:10px}
    .summary-nav a{font-size:14px;color:#4b5565}
    .summary-nav a.active{color:var(--accent);font-weight:700}
    .pill-line{display:flex;justify-content:space-between;align-items:center;font-size:14px;color:var(--muted);margin-bottom:8px}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .code-block{background:#101a2d;color:#eef5ff;padding:16px 18px;border-radius:18px;line-height:1.6;white-space:pre-wrap;overflow:auto;border:1px solid #15233d}
    .surface-note{padding:12px 14px;border-radius:14px;background:#f7fbff;border:1px solid #e2ebfa;color:var(--muted);font-size:14px;line-height:1.55}
    .muted{color:var(--muted)}
    .right{text-align:right}
    .danger-mark{color:var(--red);font-weight:700}
    .hr{height:1px;background:#edf2f7;margin:14px 0}
    .inline-actions{display:flex;gap:10px;flex-wrap:wrap}
    .card-toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}
    .w-100{width:100%}

    @media (max-width: 1180px){
      .split,.settings-layout,.detail-shell{grid-template-columns:1fr}
      .detail-side{position:static}
      .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);transition:.2s;z-index:70}
      body.sidebar-open .sidebar{transform:translateX(0)}
      .main{padding-left:0}
    }
    @media (max-width: 900px){
      .main-inner{padding:20px}
      .hero h1,.page-head h1,.detail-top h1{font-size:38px}
      .quick-form .grid,.quick-form .grid-3,.source-form .grid,.source-form .grid-3,.prompt-form .grid,.prompt-form .grid-3,.section-grid,.two-col{grid-template-columns:1fr}
      .material-card{grid-template-columns:1fr}
      .card-actions{align-items:flex-start}
      .board-wrap{grid-template-columns:repeat(7,320px)}
    }
  </style>
</head>
<body class="auth-locked">
  <div id="toast" class="toast"></div>

  <div id="loginOverlay" class="login-overlay">
    <div class="login-card">
      <div class="small-label">Приватная контент-система</div>
      <h1 class="login-title">Вход в админку</h1>
      <div class="login-sub">Система для сбора материалов, ресерча и подготовки контента. Вход по email и паролю через Supabase.</div>
      <div class="field">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" class="input" type="email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label for="loginPassword">Пароль</label>
        <input id="loginPassword" class="input" type="password" placeholder="Пароль" />
      </div>
      <div class="inline-actions">
        <button class="btn btn-primary w-100" onclick="App.login()">Войти</button>
      </div>
    </div>
  </div>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">✦</div>
        <div>
          <div class="brand-title">Контент-система</div>
          <div class="brand-sub">Research & Production</div>
        </div>
      </div>

      <div class="side-add">
        <button class="btn btn-primary w-100" onclick="App.goToQuickAdd()">＋ Добавить материал</button>
      </div>

      <nav class="nav">
        <button class="nav-btn" data-view="library" onclick="App.switchView('library')"><span class="nav-ico">▣</span>Библиотека</button>
        <button class="nav-btn" data-view="board" onclick="App.switchView('board')"><span class="nav-ico">☰</span>Доска</button>
        <button class="nav-btn" data-view="templates" onclick="App.switchView('templates')"><span class="nav-ico">◫</span>Шаблоны</button>
        <button class="nav-btn" data-view="sources" onclick="App.switchView('sources')"><span class="nav-ico">◌</span>Источники</button>
        <button class="nav-btn" data-view="prompts" onclick="App.switchView('prompts')"><span class="nav-ico">⌘</span>Промпты</button>
        <button class="nav-btn" data-view="settings" onclick="App.switchView('settings')"><span class="nav-ico">⚙</span>Настройки</button>
      </nav>

      <div class="sidebar-footer">
        <div class="user-mini">
          <div class="avatar">👤</div>
          <div>
            <strong id="sidebarUserEmail">—</strong>
            <span id="sidebarUserStatus">Оффлайн</span>
          </div>
        </div>
        <button class="icon-btn" title="Выйти" onclick="App.logout()">↗</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <div class="search-wrap">
            <span class="icon">⌕</span>
            <input id="globalSearch" class="input" type="search" placeholder="Поиск по библиотеке..." oninput="App.setSearch(this.value)" />
          </div>
        </div>
        <div class="topbar-right">
          <button class="btn btn-ghost btn-sm" onclick="App.loadData()">Обновить</button>
          <div class="count-pill" id="topbarSummary">0 материалов</div>
        </div>
      </header>

      <div class="main-inner" id="viewRoot"></div>
    </main>
  </div>

  <script>
    const SB_URL = "https://lrjcxtprwpgrdemwyptv.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxyamN4dHByd3BncmRlbXd5cHR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMzE3MTUsImV4cCI6MjA5MTkwNzcxNX0.gA67TpNrfrLxF48oSReVZt5oUSkc2-Jbl1K8CinKxsQ";
    const ALLOWED_EMAIL = "kamoroz175@gmail.com";

    const supabaseClient = supabase.createClient(SB_URL, SB_KEY, {

    const state = {
      user: null,
      initialized: false,
      currentView: 'library',
      previousView: 'library',
      currentMaterialId: null,
      materials: [],
      sources: [],
      prompts: [],
      sectionsByMaterial: {},
      search: '',
      filters: { type: 'all', status: 'all', translation: 'all', priority: 'all' },
      draggedId: null,
      settings: loadUiSettings(),
      dirtySections: new Set(),
      dirtyMaterial: false,
      promptsFilter: 'all',
      sourceFilter: 'all',
      compactList: false
    };

    function loadUiSettings() {
      try {
        return JSON.parse(localStorage.getItem('contentSystemSettings') || '{}');
      } catch {
        return {};
      }
    }
    function saveUiSettings() {
      localStorage.setItem('contentSystemSettings', JSON.stringify(state.settings));
    }

    const App = {
      async init() {
        this.bindAuthListener();
        const { data, error } = await supabaseClient.auth.getSession();
        if (error) {
          this.toast('Ошибка сессии: ' + error.message, 'err');
          this.showLogin();
          return;
        }
        if (data.session?.user) {
          await this.handleAuthenticatedUser(data.session.user);
        } else {
          this.showLogin();
        }
      },

      bindAuthListener() {
        supabaseClient.auth.onAuthStateChange(async (event, session) => {
          if (event === 'SIGNED_OUT') {
            state.user = null;
            state.initialized = false;
            this.showLogin();
            return;
          }
          if (session?.user && !state.initialized) {
            await this.handleAuthenticatedUser(session.user);
          }
        });
      },

      async handleAuthenticatedUser(user) {
        if (ALLOWED_EMAIL && (user.email || '').toLowerCase() !== ALLOWED_EMAIL.toLowerCase()) {
          await supabaseClient.auth.signOut();
          this.toast('Этот email не разрешён для входа', 'err');
          this.showLogin();
          return;
        }
        state.user = user;
        state.initialized = true;
        document.getElementById('sidebarUserEmail').textContent = user.email || 'Пользователь';
        document.getElementById('sidebarUserStatus').textContent = 'Онлайн';
        this.hideLogin();
        await this.loadData();
      },

      showLogin() {
        document.body.classList.add('auth-locked');
        document.getElementById('loginOverlay').classList.remove('hidden');
      },

      hideLogin() {
        document.body.classList.remove('auth-locked');
        document.getElementById('loginOverlay').classList.add('hidden');
      },

      async login() {
        const email = (document.getElementById('loginEmail').value || '').trim().toLowerCase();
        const password = document.getElementById('loginPassword').value || '';
        if (!email || !password) {
          this.toast('Введите email и пароль', 'err');
          return;
        }
        if (ALLOWED_EMAIL && email !== ALLOWED_EMAIL.toLowerCase()) {
          this.toast('Этот email не разрешён', 'err');
          return;
        }
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) {
          this.toast('Ошибка входа: ' + error.message, 'err');
          return;
        }
        this.toast('Вход выполнен');
      },

      async logout() {
        await supabaseClient.auth.signOut({ scope: 'local' });
        location.reload();
      },

      async loadData() {
        if (!state.user) return;
        try {
          const [materialsRes, sourcesRes, promptsRes, sectionsRes] = await Promise.all([
            supabaseClient.from('materials').select('*').order('updated_at', { ascending: false }),
            supabaseClient.from('sources').select('*').order('updated_at', { ascending: false }),
            supabaseClient.from('prompts').select('*').order('updated_at', { ascending: false }),
            supabaseClient.from('material_sections').select('*').order('position', { ascending: true })
          ]);
          if (materialsRes.error) throw materialsRes.error;
          if (sourcesRes.error) throw sourcesRes.error;
          if (promptsRes.error) throw promptsRes.error;
          if (sectionsRes.error) throw sectionsRes.error;

          state.materials = materialsRes.data || [];
          state.sources = sourcesRes.data || [];
          state.prompts = promptsRes.data || [];
          state.sectionsByMaterial = {};
          (sectionsRes.data || []).forEach(section => {
            if (!state.sectionsByMaterial[section.material_id]) state.sectionsByMaterial[section.material_id] = [];
            state.sectionsByMaterial[section.material_id].push(this.prepareSection(section));
          });

          if (!state.prompts.length) {
            await this.ensureDefaultPrompts();
          }

          this.updateTopbarSummary();
          this.render();
        } catch (error) {
          console.error(error);
          this.toast('Ошибка загрузки: ' + (error.message || 'неизвестно'), 'err');
        }
      },

      prepareSection(section) {
        return {
          ...section,
          data: section.data || {},
          checklist: this.normalizeChecklist(section.checklist)
        };
      },

      normalizeChecklist(raw) {
        if (!raw) return [];
        if (Array.isArray(raw)) {
          return raw.map(item => {
            if (typeof item === 'string') return { text: item, done: false };
            return { text: String(item.text || ''), done: Boolean(item.done) };
          }).filter(item => item.text);
        }
        return [];
      },

      async ensureDefaultPrompts() {
        const rows = DEFAULT_PROMPTS.map(prompt => ({ ...prompt, user_id: state.user.id }));
        const { error } = await supabaseClient.from('prompts').insert(rows);
        if (!error) {
          const { data } = await supabaseClient.from('prompts').select('*').order('updated_at', { ascending: false });
          state.prompts = data || [];
        }
      },

      updateTopbarSummary() {
        const total = state.materials.length;
        const inWork = state.materials.filter(item => ['research','script','production'].includes(item.status)).length;
        document.getElementById('topbarSummary').textContent = `${total} материалов · ${inWork} в процессе`;
      },

      setSearch(value) {
        state.search = value || '';
        this.render();
      },

      switchView(view) {
        if (state.currentView === 'detail' && state.dirtyMaterial) {
          // no-op, explicit save is preferred
        }
        state.previousView = state.currentView === 'detail' ? (state.previousView || 'library') : state.currentView;
        state.currentView = view;
        if (view !== 'detail') state.currentMaterialId = null;
        this.render();
      },

      goBackFromDetail() {
        state.currentView = state.previousView || 'library';
        state.currentMaterialId = null;
        this.render();
      },

      goToQuickAdd(prefillType = null) {
        state.currentView = 'library';
        this.render();
        setTimeout(() => {
          if (prefillType) {
            const typeField = document.getElementById('qaType');
            if (typeField) typeField.value = prefillType;
          }
          const target = document.getElementById('qaUrl');
          if (target) target.focus();
        }, 30);
      },

      render() {
        this.highlightNav();
        this.syncSearchPlaceholder();
        const root = document.getElementById('viewRoot');
        if (!state.user) {
          root.innerHTML = '';
          return;
        }
        if (state.currentView === 'library') root.innerHTML = this.renderLibraryView();
        else if (state.currentView === 'board') root.innerHTML = this.renderBoardView();
        else if (state.currentView === 'templates') root.innerHTML = this.renderTemplatesView();
        else if (state.currentView === 'sources') root.innerHTML = this.renderSourcesView();
        else if (state.currentView === 'prompts') root.innerHTML = this.renderPromptsView();
        else if (state.currentView === 'settings') root.innerHTML = this.renderSettingsView();
        else if (state.currentView === 'detail') root.innerHTML = this.renderDetailView();
      },

      syncSearchPlaceholder() {
        const input = document.getElementById('globalSearch');
        const map = {
          library: 'Поиск по библиотеке...',
          board: 'Поиск по доске...',
          templates: 'Поиск по шаблонам...',
          sources: 'Поиск по источникам...',
          prompts: 'Поиск по промптам...',
          settings: 'Поиск в настройках...',
          detail: 'Поиск внутри материала...'
        };
        input.placeholder = map[state.currentView] || 'Поиск...';
      },

      highlightNav() {
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        if (state.currentView === 'detail') {
          const lib = document.querySelector('.nav-btn[data-view="library"]');
          if (lib) lib.classList.add('active');
        } else {
          const active = document.querySelector(`.nav-btn[data-view="${state.currentView}"]`);
          if (active) active.classList.add('active');
        }
      },

      getFilteredMaterials(forBoard = false) {
        const q = state.search.trim().toLowerCase();
        return state.materials.filter(item => {
          const sourceName = item.source_name || this.getSourceName(item.source_id) || '';
          const matchesSearch = !q || [item.title, item.short_task, item.source_url, sourceName].filter(Boolean).some(v => String(v).toLowerCase().includes(q));
          const matchesType = state.filters.type === 'all' || item.material_type === state.filters.type;
          const matchesStatus = state.filters.status === 'all' || item.status === state.filters.status;
          const matchesTranslation = state.filters.translation === 'all' || (state.filters.translation === 'yes' ? item.translation_required : !item.translation_required);
          const matchesPriority = state.filters.priority === 'all' || item.priority === state.filters.priority;
          return matchesSearch && matchesType && matchesStatus && matchesTranslation && matchesPriority;
        });
      },

      renderFilterChips(showStatus = true) {
        return `
          <div class="filters-row">
            <span class="small-label">Фильтры:</span>
            <button class="chip ${state.filters.type === 'all' ? 'active' : ''}" onclick="App.setFilter('type','all')">Все</button>
            ${MATERIAL_TYPES.filter(t => t.id !== 'raw').map(type => `<button class="chip ${state.filters.type === type.id ? 'active' : ''}" onclick="App.setFilter('type','${type.id}')">${type.label}</button>`).join('')}
            ${showStatus ? STATUSES.slice(0,7).map(status => `<button class="chip ${state.filters.status === status.id ? 'active' : ''}" onclick="App.setFilter('status','${status.id}')">${status.label}</button>`).join('') : ''}
            <button class="chip ${state.filters.priority === 'high' ? 'active' : ''}" onclick="App.setFilter('priority', state.filters.priority === 'high' ? 'all' : 'high')">Срочное</button>
            <button class="chip ${state.filters.translation === 'yes' ? 'active' : ''}" onclick="App.setFilter('translation', state.filters.translation === 'yes' ? 'all' : 'yes')">Нужен перевод</button>
            <button class="chip" onclick="App.resetFilters()">Сбросить</button>
          </div>
        `;
      },

      setFilter(key, value) {
        state.filters[key] = value;
        this.render();
      },

      resetFilters() {
        state.filters = { type: 'all', status: 'all', translation: 'all', priority: 'all' };
        state.search = '';
        document.getElementById('globalSearch').value = '';
        this.render();
      },

      renderLibraryView() {
        const materials = this.getFilteredMaterials();
        return `
          <div class="hero">
            <h1>Библиотека материалов</h1>
            <p>Собирайте статьи, видео, посты и карусели, раскладывайте их по этапам и доводите до готового контента в одной системе.</p>
          </div>
          <div class="split">
            <div>
              <div class="panel quick-form">
                <div class="panel-head">
                  <div class="section-title">Быстрое добавление</div>
                </div>
                <div class="panel-body">
                  <div class="field">
                    <label>Ссылка</label>
                    <input id="qaUrl" class="input" placeholder="https://..." />
                  </div>
                  <div class="field">
                    <label>Название</label>
                    <input id="qaTitle" class="input" placeholder="Короткое название материала" />
                  </div>
                  <div class="grid">
                    <div class="field">
                      <label>Тип</label>
                      <select id="qaType" class="select">
                        ${MATERIAL_TYPES.map(t => `<option value="${t.id}">${t.label}</option>`).join('')}
                      </select>
                    </div>
                    <div class="field">
                      <label>Приоритет</label>
                      <select id="qaPriority" class="select">
                        ${PRIORITIES.map(p => `<option value="${p.id}" ${p.id === 'medium' ? 'selected' : ''}>${p.label}</option>`).join('')}
                      </select>
                    </div>
                  </div>
                  <div class="grid">
                    <div class="field">
                      <label>Итоговый формат</label>
                      <select id="qaOutput" class="select">
                        ${OUTPUT_FORMATS.map(out => `<option value="${out.id}">${out.label}</option>`).join('')}
                      </select>
                    </div>
                    <div class="field">
                      <label>Источник</label>
                      <select id="qaSource" class="select">
                        <option value="">Без привязки</option>
                        ${state.sources.map(source => `<option value="${source.id}">${e(source.name)}</option>`).join('')}
                      </select>
                    </div>
                  </div>
                  <div class="field">
                    <label>Что нужно сделать</label>
                    <textarea id="qaTask" class="textarea" placeholder="Короткая задача: что вы хотите получить из этого материала"></textarea>
                  </div>
                  <div class="field">
                    <label><input id="qaTranslation" type="checkbox" style="accent-color:var(--accent);margin-right:8px">Нужен перевод</label>
                  </div>
                  <button class="btn btn-primary w-100" onclick="App.quickAddMaterial()">Сохранить во входящие</button>
                </div>
              </div>
              <div class="panel stat-card">
                <div class="small-label">Ожидают обработки</div>
                <div class="big">${state.materials.filter(m => m.status === 'inbox').length}</div>
                <div class="muted" style="margin-top:10px">материалов во входящих</div>
              </div>
            </div>
            <div>
              ${this.renderFilterChips()}
              <div class="list-tools">
                <div class="small-label">${materials.length} записей</div>
                <div class="seg">
                  <button class="${!state.compactList ? 'active' : ''}" onclick="App.setCompact(false)">▤</button>
                  <button class="${state.compactList ? 'active' : ''}" onclick="App.setCompact(true)">☷</button>
                </div>
              </div>
              ${materials.length ? `<div class="material-list">${materials.map(item => this.renderMaterialCard(item)).join('')}</div>` : `<div class="empty">Ничего не найдено. Попробуйте другой фильтр или добавьте новый материал.</div>`}
            </div>
          </div>
        `;
      },

      setCompact(flag) {
        state.compactList = flag;
        this.render();
      },

      renderMaterialCard(item) {
        const progress = this.getMaterialProgress(item.id);
        const sourceName = item.source_name || this.getSourceName(item.source_id) || this.domainFromUrl(item.source_url) || 'Источник не указан';
        return `
          <div class="material-card ${state.compactList ? 'compact' : ''}">
            <div>
              <div class="meta-line">
                <span class="badge type">${this.getTypeLabel(item.material_type)}</span>
                <span>•</span>
                <span>${e(sourceName)}</span>
                ${item.translation_required ? `<span class="badge translation">Нужен перевод</span>` : ''}
                <span class="badge output">${this.getOutputLabel(item.output_format)}</span>
              </div>
              <h3>${e(item.title)}</h3>
              <p>${e(item.short_task || 'Задача не описана')}</p>
              <div class="meta-line" style="margin-top:14px">
                <span class="badge status">${this.getStatusLabel(item.status)}</span>
                <span class="badge priority-${item.priority}">${this.getPriorityLabel(item.priority)}</span>
                <span>${this.formatDate(item.updated_at)}</span>
              </div>
            </div>
            <div class="card-actions">
              <div class="inline-actions">
                <button class="icon-btn" title="Открыть" onclick="App.openMaterial('${item.id}')">↗</button>
                <button class="icon-btn" title="Архив" onclick="App.quickMoveStatus('${item.id}','archive')">⌁</button>
              </div>
              <div class="progress">
                <span>${progress.done}/${progress.total || 0} задач</span>
                <div class="progress-bar"><span style="width:${progress.percent}%"></span></div>
              </div>
            </div>
          </div>
        `;
      },

      renderBoardView() {
        const materials = this.getFilteredMaterials(true);
        return `
          <div class="page-head">
            <div>
              <h1>Контент-план</h1>
              <p>Перетаскивайте материалы по этапам: от входящих к публикации. Это обзор пайплайна, а не место для глубокой работы.</p>
            </div>
          </div>
          ${this.renderFilterChips(false)}
          <div class="board-wrap">
            ${STATUSES.slice(0,7).map(status => {
              const items = materials.filter(item => item.status === status.id);
              return `
                <section class="board-col" ondragover="App.onDragOver(event)" ondrop="App.onDrop(event,'${status.id}')">
                  <div class="board-head">
                    <h3>${status.label}</h3>
                    <div class="board-count">${items.length}</div>
                  </div>
                  <div class="board-list">
                    ${items.map(item => this.renderBoardCard(item)).join('') || `<div class="board-drop">Пока пусто</div>`}
                  </div>
                </section>
              `;
            }).join('')}
          </div>
        `;
      },

      renderBoardCard(item) {
        const progress = this.getMaterialProgress(item.id);

      renderDetailSection(material, section) {
        return `
          <section class="detail-section" id="section-${section.id}">

              <div>
                <h3>${e(section.title)}</h3>
                ${section.helper ? `<div class="detail-helper">${e(section.helper)}</div>` : ''}

            </div>
            ${section.subfields && section.subfields.length ? `
              <div class="section-grid">
                ${section.subfields.map(field => this.renderSectionField(section, field)).join('')}
              </div>
            ` : ''}
            ${section.content !== undefined ? `
              <div class="field">
                <label>${e(section.bodyLabel || 'Заметки')}</label>
                <textarea class="textarea big" oninput="App.updateSectionContent('${section.id}', this.value)">${e(section.content || '')}</textarea>
              </div>
            ` : ''}
            <div class="hr"></div>
            <div class="small-label" style="margin-bottom:12px">Чеклист</div>
            <div class="checklist">
              ${section.checklist.length ? section.checklist.map((item, index) => `
                <label class="check-item ${item.done ? 'done' : ''}">
                  <input type="checkbox" ${item.done ? 'checked' : ''} onchange="App.toggleChecklist('${section.id}', ${index})">
                  <span>${e(item.text)}</span>
                  <button class="icon-btn" type="button" onclick="App.removeChecklistItem('${section.id}', ${index})">×</button>
                </label>
              `).join('') : `<div class="surface-note">Пока нет чеклиста. Добавьте первый пункт ниже.</div>`}
            </div>
            <div class="check-add">
              <input id="check-input-${section.id}" class="input" placeholder="Добавить пункт чеклиста" />

          </section>
        `;
      },

      renderSectionField(section, field) {
        const value = section.data?.[field.key] || '';
        if (field.type === 'textarea') {
          return `
            <div class="field">
              <label>${e(field.label)}</label>
              <textarea class="textarea" oninput="App.updateSectionData('${section.id}','${field.key}', this.value)">${e(value)}</textarea>
            </div>
          `;
        }
        return `
          <div class="field">
            <label>${e(field.label)}</label>
            <input class="input" value="${eAttr(value)}" oninput="App.updateSectionData('${section.id}','${field.key}', this.value)" />
          </div>
        `;
      },

      getMaterialProgress(materialId) {
        const sections = state.sectionsByMaterial[materialId] || [];
        let total = 0;
        let done = 0;
        sections.forEach(section => {
          const checklist = this.normalizeChecklist(section.checklist);
          total += checklist.length;
          done += checklist.filter(item => item.done).length;
        });
        const percent = total ? Math.round(done / total * 100) : 0;
        return { total, done, percent };
      },

      getSourceName(sourceId) {
        const source = state.sources.find(item => item.id === sourceId);
        return source ? source.name : '';
      },

      async quickAddMaterial() {
        const payload = {
          title: v('qaTitle') || 'Новый материал',
          source_url: v('qaUrl') || null,
          material_type: g('qaType') || 'raw',
          priority: g('qaPriority') || 'medium',
          output_format: g('qaOutput') || 'tg_post',
          short_task: v('qaTask') || null,
          translation_required: document.getElementById('qaTranslation').checked,
          source_id: g('qaSource') || null
        };
        try {
          const material = await this.createMaterial(payload);
          this.clearQuickAdd();
          this.toast('Материал добавлен');
          this.openMaterial(material.id);
        } catch (error) {
          console.error(error);
          this.toast('Ошибка добавления: ' + error.message, 'err');
        }
      },

      clearQuickAdd() {
        ['qaUrl','qaTitle','qaTask'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
        const tr = document.getElementById('qaTranslation'); if (tr) tr.checked = false;
      },

      async createMaterial(payload) {
        const source = payload.source_id ? state.sources.find(item => item.id === payload.source_id) : null;
        const row = {
          user_id: state.user.id,
          title: payload.title,
          source_url: payload.source_url,
          source_name: source?.name || this.domainFromUrl(payload.source_url) || null,
          source_id: payload.source_id,
          material_type: payload.material_type,
          status: payload.status || 'inbox',
          priority: payload.priority || 'medium',
          output_format: payload.output_format || 'tg_post',
          translation_required: Boolean(payload.translation_required),
          short_task: payload.short_task || null,
          notes: payload.notes || null
        };
        const { data, error } = await supabaseClient.from('materials').insert([row]).select().single();
        if (error) throw error;
        const templateRows = this.buildSectionRows(data.id, data.material_type);
        if (templateRows.length) {
          const { data: sectionsData, error: sectionsError } = await supabaseClient.from('material_sections').insert(templateRows).select().order('position', { ascending: true });
          if (sectionsError) throw sectionsError;
          state.sectionsByMaterial[data.id] = (sectionsData || []).map(section => this.prepareSection(section));
        } else {
          state.sectionsByMaterial[data.id] = [];
        }
        state.materials.unshift(data);
        this.updateTopbarSummary();
        return data;
      },

      buildSectionRows(materialId, materialType) {
        const template = SYSTEM_TEMPLATES[materialType] || SYSTEM_TEMPLATES.raw;
        return template.sections.map((section, index) => ({
          user_id: state.user.id,
          material_id: materialId,
          section_key: section.key,
          title: section.title,
          helper: section.helper || null,
          position: index,
          content: '',
          data: {},
          checklist: (section.checklist || []).map(text => ({ text, done: false }))
        }));
      },

      async createFromTemplate(type) {
        try {
          const title = `Новый материал — ${this.getTypeLabel(type)}`;
          const material = await this.createMaterial({ title, material_type: type, priority: 'medium', output_format: (SYSTEM_TEMPLATES[type]?.recommended?.[0] || 'notes') });
          this.openMaterial(material.id);
          this.toast('Карточка создана по шаблону');
        } catch (error) {
          this.toast('Не удалось создать карточку: ' + error.message, 'err');
        }
      },

      previewTemplate(type) {
        const tpl = SYSTEM_TEMPLATES[type];
        if (!tpl) return;
        this.toast(`${tpl.label}: ${tpl.sections.map(s => s.title).join(' • ')}`);
      },

      prefillFromSource(sourceId) {
        state.currentView = 'library';
        this.render();
        setTimeout(() => {
          const select = document.getElementById('qaSource');
          if (select) select.value = sourceId;
          const target = document.getElementById('qaUrl');
          if (target) target.focus();
        }, 40);
      },

      async addSource() {
        const row = {
          user_id: state.user.id,
          name: v('sourceName'),
          source_type: g('sourceType') || 'website',
          url: v('sourceUrl') || null,
          category: v('sourceCategory') || null,
          description: v('sourceDescription') || null,
          notes: v('sourceNotes') || null
        };
        if (!row.name) {
          this.toast('Введите название источника', 'err');
          return;
        }
        const { data, error } = await supabaseClient.from('sources').insert([row]).select().single();
        if (error) {
          this.toast('Ошибка: ' + error.message, 'err');
          return;
        }
        state.sources.unshift(data);
        this.render();
        this.toast('Источник добавлен');
        ['sourceName','sourceUrl','sourceCategory','sourceDescription','sourceNotes'].forEach(id => document.getElementById(id).value = '');
      },

      async deleteSource(id) {
        if (!confirm('Удалить источник?')) return;
        const { error } = await supabaseClient.from('sources').delete().eq('id', id);
        if (error) {
          this.toast('Не удалось удалить источник', 'err');
          return;
        }
        state.sources = state.sources.filter(item => item.id !== id);
        state.materials = state.materials.map(item => item.source_id === id ? { ...item, source_id: null, source_name: item.source_name } : item);
        this.render();
        this.toast('Источник удалён');
      },

      async addPrompt() {
        const row = {
          user_id: state.user.id,
          title: v('promptTitle'),
          category: g('promptCategory') || 'research',
          description: v('promptDescription') || null,
          body: v('promptBody')
        };
        if (!row.title || !row.body) {
          this.toast('Введите название и текст промпта', 'err');
          return;
        }
        const { data, error } = await supabaseClient.from('prompts').insert([row]).select().single();
        if (error) {
          this.toast('Ошибка: ' + error.message, 'err');
          return;
        }
        state.prompts.unshift(data);
        this.render();
        this.toast('Промпт сохранён');
        ['promptTitle','promptDescription','promptBody'].forEach(id => document.getElementById(id).value = '');
      },

      setPromptFilter(value) {
        state.promptsFilter = value;
        this.render();
      },

      async copyPrompt(id) {
        const prompt = state.prompts.find(item => item.id === id);
        if (!prompt) return;
        await navigator.clipboard.writeText(prompt.body || '');
        this.toast('Промпт скопирован');
      },

      async toggleFavoritePrompt(id) {
        const prompt = state.prompts.find(item => item.id === id);
        if (!prompt) return;
        const next = !prompt.is_favorite;
        const { error } = await supabaseClient.from('prompts').update({ is_favorite: next }).eq('id', id);
        if (error) {
          this.toast('Не удалось обновить промпт', 'err');
          return;
        }
        prompt.is_favorite = next;
        this.render();
      },

      async deletePrompt(id) {
        if (!confirm('Удалить промпт?')) return;
        const { error } = await supabaseClient.from('prompts').delete().eq('id', id);
        if (error) {
          this.toast('Не удалось удалить промпт', 'err');
          return;
        }
        state.prompts = state.prompts.filter(item => item.id !== id);
        this.render();
      },

      async openMaterial(id) {
        state.previousView = state.currentView === 'detail' ? (state.previousView || 'library') : state.currentView;
        state.currentMaterialId = id;
        state.currentView = 'detail';
        state.dirtySections.clear();
        state.dirtyMaterial = false;
        this.render();
      },

      markMaterialDirty() {
        state.dirtyMaterial = true;
      },

      updateSectionContent(sectionId, value) {
        const section = this.findSection(sectionId);
        if (!section) return;
        section.content = value;
        state.dirtySections.add(sectionId);
      },

      updateSectionData(sectionId, key, value) {
        const section = this.findSection(sectionId);
        if (!section) return;
        if (!section.data) section.data = {};
        section.data[key] = value;
        state.dirtySections.add(sectionId);
      },

      findSection(sectionId) {
        for (const materialId of Object.keys(state.sectionsByMaterial)) {
          const found = state.sectionsByMaterial[materialId].find(item => item.id === sectionId);
          if (found) return found;
        }
        return null;
      },

      async saveDetail() {
        const material = state.materials.find(item => item.id === state.currentMaterialId);
        if (!material) return;
        const updates = {
          title: v('detailTitle') || material.title,
          source_url: v('detailUrl') || null,
          material_type: g('detailType') || material.material_type,
          status: g('detailStatus') || material.status,
          priority: g('detailPriority') || material.priority,
          output_format: g('detailOutput') || material.output_format,
          source_id: g('detailSourceId') || null,
          source_name: this.getSourceName(g('detailSourceId')) || this.domainFromUrl(v('detailUrl')) || null,
          translation_required: document.getElementById('detailTranslation').checked,
          short_task: v('detailTask') || null
        };
        try {
          const typeChanged = material.material_type !== updates.material_type;
          const { data, error } = await supabaseClient.from('materials').update(updates).eq('id', material.id).select().single();
          if (error) throw error;
          Object.assign(material, data);

          if (typeChanged) {
            const ok = confirm('Тип материала изменён. Пересобрать секции по новому шаблону? Текущие секции будут заменены.');
            if (ok) {
              await supabaseClient.from('material_sections').delete().eq('material_id', material.id);
              const rows = this.buildSectionRows(material.id, updates.material_type);
              const { data: newSections, error: secErr } = await supabaseClient.from('material_sections').insert(rows).select().order('position', { ascending: true });
              if (secErr) throw secErr;
              state.sectionsByMaterial[material.id] = (newSections || []).map(section => this.prepareSection(section));
              state.dirtySections.clear();
            }
          } else {
            const dirty = Array.from(state.dirtySections);
            if (dirty.length) {
              for (const sectionId of dirty) {
                const section = this.findSection(sectionId);
                if (!section) continue;
                const { error: secErr } = await supabaseClient.from('material_sections').update({
                  title: section.title,
                  helper: section.helper,
                  content: section.content || '',
                  data: section.data || {},
                  checklist: section.checklist || []
                }).eq('id', section.id);
                if (secErr) throw secErr;
              }
            }
          }
          state.dirtyMaterial = false;
          state.dirtySections.clear();
          this.updateTopbarSummary();
          this.render();
          this.toast('Карточка сохранена');
        } catch (error) {
          console.error(error);
          this.toast('Ошибка сохранения: ' + error.message, 'err');
        }
      },

      async markDetailComplete() {
        const material = state.materials.find(item => item.id === state.currentMaterialId);
        if (!material) return;
        await this.saveDetail();
        await this.quickMoveStatus(material.id, 'ready', false);
        this.toast('Карточка переведена в статус “Готово”');
      },

      async duplicateMaterial(id) {
        const material = state.materials.find(item => item.id === id);
        if (!material) return;
        const duplicated = await this.createMaterial({
          title: material.title + ' (копия)',
          source_url: material.source_url,
          material_type: material.material_type,
          priority: material.priority,
          output_format: material.output_format,
          short_task: material.short_task,
          translation_required: material.translation_required,
          source_id: material.source_id,
          status: 'inbox'
        });
        const sourceSections = (state.sectionsByMaterial[id] || []).map(section => ({
          ...section,
          material_id: duplicated.id,
          id: undefined,
          user_id: state.user.id
        }));
        await supabaseClient.from('material_sections').delete().eq('material_id', duplicated.id);
        const rows = sourceSections.map((section, index) => ({
          user_id: state.user.id,
          material_id: duplicated.id,
          section_key: section.section_key,
          title: section.title,
          helper: section.helper,
          position: index,
          content: section.content || '',
          data: section.data || {},
          checklist: section.checklist || []
        }));
        const { data: sectionCopy, error } = await supabaseClient.from('material_sections').insert(rows).select().order('position', { ascending: true });
        if (!error) {
          state.sectionsByMaterial[duplicated.id] = (sectionCopy || []).map(section => this.prepareSection(section));
        }
        this.toast('Материал дублирован');
        this.openMaterial(duplicated.id);
      },

      async deleteMaterial(id) {
        if (!confirm('Удалить материал и все его секции?')) return;
        const { error } = await supabaseClient.from('materials').delete().eq('id', id);
        if (error) {
          this.toast('Не удалось удалить материал', 'err');
          return;
        }
        delete state.sectionsByMaterial[id];
        state.materials = state.materials.filter(item => item.id !== id);
        state.currentMaterialId = null;
        state.currentView = state.previousView || 'library';
        this.updateTopbarSummary();
        this.render();
      },

      onTypeChange(value) {
        state.dirtyMaterial = true;
        const out = document.getElementById('detailOutput');
        if (out && SYSTEM_TEMPLATES[value]?.recommended?.[0]) out.value = SYSTEM_TEMPLATES[value].recommended[0];
      },

      async quickMoveStatus(id, status, rerender = true) {
        const material = state.materials.find(item => item.id === id);
        if (!material) return;
        const { error } = await supabaseClient.from('materials').update({ status }).eq('id', id);
        if (error) {
          this.toast('Не удалось обновить статус', 'err');
          return;
        }
        material.status = status;
        if (rerender) this.render();
        this.updateTopbarSummary();
      },

      async quickAdvance(id) {
        const material = state.materials.find(item => item.id === id);
        if (!material) return;
        const idx = STATUSES.findIndex(s => s.id === material.status);
        if (idx < 0 || idx >= STATUSES.length - 2) {
          this.toast('Дальше переводить уже некуда');
          return;
        }
        await this.quickMoveStatus(id, STATUSES[idx + 1].id);
      },

      onDragStart(event, id) {
        state.draggedId = id;
        event.dataTransfer.effectAllowed = 'move';
      },
      onDragOver(event) {
        event.preventDefault();
      },
      async onDrop(event, status) {
        event.preventDefault();
        if (!state.draggedId) return;
        await this.quickMoveStatus(state.draggedId, status);
        state.draggedId = null;
      },

      toggleChecklist(sectionId, index) {
        const section = this.findSection(sectionId);
        if (!section) return;
        if (!section.checklist[index]) return;
        section.checklist[index].done = !section.checklist[index].done;
        state.dirtySections.add(sectionId);
        this.render();
      },

      addChecklistItem(sectionId) {
        const input = document.getElementById(`check-input-${sectionId}`);
        const value = (input?.value || '').trim();
        if (!value) return;
        const section = this.findSection(sectionId);
        if (!section) return;
        section.checklist.push({ text: value, done: false });
        state.dirtySections.add(sectionId);
        this.render();
      },

      removeChecklistItem(sectionId, index) {
        const section = this.findSection(sectionId);
        if (!section) return;
        section.checklist.splice(index, 1);
        state.dirtySections.add(sectionId);
        this.render();
      },

      async copySection(sectionId) {
        const section = this.findSection(sectionId);
        if (!section) return;
        const payload = {
          title: section.title,
          content: section.content || '',
          data: section.data || {},
          checklist: section.checklist || []
        };
        await navigator.clipboard.writeText(JSON.stringify(payload, null, 2));
        this.toast('Секция скопирована в JSON');
      },

      toggleSetting(key) {
        state.settings[key] = !state.settings[key];
        saveUiSettings();
        this.render();
      },

      async exportBackup() {
        const backup = {
          exported_at: new Date().toISOString(),
          user: state.user?.email,
          materials: state.materials,
          sections: state.sectionsByMaterial,
          sources: state.sources,
          prompts: state.prompts
        };
        const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'content-system-backup.json';
        a.click();
        URL.revokeObjectURL(url);
      },

      getTypeLabel(id) { return MATERIAL_TYPES.find(t => t.id === id)?.label || id; },
      getStatusLabel(id) { return STATUSES.find(s => s.id === id)?.label || id; },
      getPriorityLabel(id) { return PRIORITIES.find(p => p.id === id)?.label || id; },
      getOutputLabel(id) { return OUTPUT_FORMATS.find(o => o.id === id)?.label || id; },
      getSourceTypeLabel(id) { return SOURCE_TYPES.find(t => t.id === id)?.label || id; },
      getPromptCategoryLabel(id) { return PROMPT_CATEGORIES.find(t => t.id === id)?.label || id; },
      formatDate(date) {
        if (!date) return '—';
        return new Date(date).toLocaleDateString('ru-RU', { day: '2-digit', month: 'short' });
      },
      trimText(text, len) {
        const s = String(text || '');
        return s.length > len ? s.slice(0, len) + '…' : s;
      },
      domainFromUrl(url) {
        if (!url) return '';
        try { return new URL(url).hostname.replace(/^www\./,''); } catch { return ''; }
      },
      toast(msg, type = '') {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = `toast show ${type}`;
        clearTimeout(this._toastTimer);
        this._toastTimer = setTimeout(() => el.className = 'toast', 2600);
      }
    };

    function v(id) { return (document.getElementById(id)?.value || '').trim(); }
    function g(id) { return document.getElementById(id)?.value || ''; }
    function e(value) { return String(value ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function eAttr(value) { return e(value).replace(/'/g, '&#39;'); }

    window.App = App;
    document.addEventListener('keydown', ev => {
      if (ev.key === 'Enter' && !ev.shiftKey) {
        const active = document.activeElement;
        if (active && active.id === 'loginPassword') App.login();
      }
    });

    App.init();
  </script>
</body>
</html>
